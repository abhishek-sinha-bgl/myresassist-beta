<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyResAssist | Personal Research Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --bg-deep: #0a0b0e;
            --bg-sidebar: #0d0f12;
            --bg-card: rgba(17, 20, 24, 0.9);
            --accent: #00d1ff;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --font-primary: 'Inter', sans-serif;
            --border-val: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg-deep: #f8fafc;
            --bg-sidebar: #f1f5f9;
            --bg-card: rgba(255, 255, 255, 0.9);
            --accent: #2563eb;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --border-val: rgba(0, 0, 0, 0.1);
        }

        [data-theme="academic"] {
            --bg-deep: #fdfbf7;
            --bg-sidebar: #f4f1ea;
            --bg-card: #ffffff;
            --accent: #7c2d12;
            --text-main: #1a1a1a;
            --text-dim: #57534e;
            --font-primary: 'Noto Serif', serif;
            --border-val: rgba(0, 0, 0, 0.15);
        }

        [data-theme="modern"] {
            --bg-deep: #050505;
            --bg-sidebar: #000000;
            --bg-card: rgba(15, 15, 15, 0.8);
            --accent: #c084fc;
            --text-main: #fafafa;
            --text-dim: #a1a1aa;
            --border-val: rgba(255, 255, 255, 0.15);
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-primary);
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--border-val); }
        
        /* Select Dropdown Contrast Fix */
        .input-dark { 
            background: rgba(0, 0, 0, 0.2); 
            border: 1px solid var(--border-val); 
            border-radius: 6px; 
            transition: all 0.2s; 
            color: inherit; 
        }
        select.input-dark option { 
            background-color: #1a1a1a; 
            color: #ffffff; 
        }
        [data-theme="light"] select.input-dark option { 
            background-color: #ffffff; 
            color: #000000; 
        }

        .btn-outline { border: 1px solid var(--accent); color: var(--accent); transition: all 0.2s; }
        .btn-outline:hover { background: rgba(0, 209, 255, 0.1); }
        .btn-action { background: var(--accent); color: #000; font-weight: 700; transition: all 0.2s; }
        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 10px; opacity: 0.3; }

        .topic-item.active { background: rgba(0, 209, 255, 0.08); border-left: 2px solid var(--accent); color: var(--accent); }
        .gradient-text { background: linear-gradient(135deg, var(--text-main) 0%, var(--text-dim) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="h-screen flex flex-col" data-theme="dark">

    <!-- API Config Modal -->
    <div id="settingsModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
        <div class="glass w-full max-w-xl rounded-xl p-8 modal-enter max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-bold" id="modalTitle">API Configuration</h2>
                <button onclick="toggleModal('settingsModal')" class="text-slate-500 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            
            <section class="mb-8">
                <div class="flex justify-between items-end mb-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Trusted Sources</label>
                    <span class="text-[9px] text-slate-500 uppercase tracking-tighter italic">Grounding Domains</span>
                </div>
                <div class="flex gap-2">
                    <input id="newSource" type="text" placeholder="e.g. data.worldbank.org" class="flex-1 input-dark p-2.5 text-sm">
                    <button onclick="addSource()" class="btn-outline px-4 py-2 rounded font-mono text-xs">+ Add</button>
                </div>
                <div id="sourceList" class="mt-3 flex flex-wrap gap-2"></div>
            </section>

            <hr class="border-white/5 mb-8">

            <div class="flex gap-6 border-b border-white/5 mb-6 text-sm text-slate-500 font-medium">
                <button onclick="switchTab('Claude')" class="provider-tab pb-2 px-1" id="tab-Claude">Claude</button>
                <button onclick="switchTab('OpenAI')" class="provider-tab pb-2 px-1" id="tab-OpenAI">OpenAI</button>
                <button onclick="switchTab('Gemini')" class="provider-tab pb-2 px-1" id="tab-Gemini">Gemini</button>
                <button onclick="switchTab('Custom')" class="provider-tab pb-2 px-1" id="tab-Custom">Custom</button>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-2 tracking-widest">Provider Label</label>
                    <input id="configName" type="text" placeholder="e.g. My OpenRouter account" class="w-full input-dark p-2.5 text-xs font-semibold">
                </div>

                <div id="customEndpointGroup" class="hidden">
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-2 tracking-widest">Base API URL</label>
                    <input id="configUrl" type="text" class="w-full input-dark p-2.5 text-xs mono" placeholder="https://openrouter.ai/api/v1">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-2 tracking-widest">Secret Key</label>
                    <div class="relative">
                        <input id="configKey" type="password" class="w-full input-dark p-2.5 text-xs mono pr-10" placeholder="••••••••••••••••">
                        <button onclick="toggleKeyVisibility()" class="absolute right-3 top-2.5 text-slate-500"><i data-lucide="eye" class="w-4 h-4"></i></button>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-2 tracking-widest">Model</label>
                    <select id="configModel" class="w-full input-dark p-2.5 text-xs mono"></select>
                </div>

                <div class="flex items-center justify-between">
                    <button id="fetchModelsBtn" onclick="fetchModels()" class="btn-outline px-4 py-2 rounded text-xs flex items-center gap-2">
                        <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> Fetch models
                    </button>
                    <div class="text-xs text-slate-500">
                        Target: <span id="providerDisplayHint" class="text-accent underline">Gemini</span>
                    </div>
                </div>
            </div>

            <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-white/5">
                <button onclick="resetConfigForm(); toggleModal('settingsModal')" class="px-6 py-2.5 rounded text-sm font-medium text-slate-400 hover:text-white">Cancel</button>
                <button onclick="saveProvider()" class="px-8 py-2.5 rounded text-sm font-medium bg-white text-black hover:bg-slate-200">Save Profile</button>
            </div>

            <div class="mt-10">
                <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Saved Profiles</h3>
                <div id="providerList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-12 right-6 z-[110] hidden glass px-4 py-3 rounded-xl border-l-4 border-accent shadow-2xl transition-all translate-y-10">
        <p id="toastMessage" class="text-xs font-medium"></p>
    </div>

    <!-- Navigation -->
    <nav class="h-14 border-b border-white/5 flex items-center justify-between px-6 glass shrink-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-7 h-7 bg-indigo-600 rounded flex items-center justify-center font-bold text-sm text-white shadow-lg">R</div>
            <span class="font-semibold tracking-tight">MyResAssist <span class="text-[10px] text-accent font-mono ml-1 opacity-70 italic uppercase tracking-tighter">Personal Lab</span></span>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="flex items-center bg-black/20 rounded-lg p-1 border border-white/5">
                <button onclick="setTheme('dark')" class="p-1.5 rounded hover:bg-white/5 theme-btn" id="tbtn-dark"><i data-lucide="moon" class="w-3.5 h-3.5"></i></button>
                <button onclick="setTheme('light')" class="p-1.5 rounded hover:bg-white/5 theme-btn" id="tbtn-light"><i data-lucide="sun" class="w-3.5 h-3.5"></i></button>
                <button onclick="setTheme('academic')" class="p-1.5 rounded hover:bg-white/5 theme-btn" id="tbtn-academic"><i data-lucide="book" class="w-3.5 h-3.5"></i></button>
                <button onclick="setTheme('modern')" class="p-1.5 rounded hover:bg-white/5 theme-btn" id="tbtn-modern"><i data-lucide="sparkles" class="w-3.5 h-3.5"></i></button>
            </div>
            <div id="activeProviderTag" class="text-[10px] mono text-slate-500 hidden md:block"></div>
            <button onclick="resetConfigForm(); toggleModal('settingsModal')" class="text-slate-400 hover:text-accent p-2 rounded-lg hover:bg-white/5"><i data-lucide="settings" class="w-4 h-4"></i></button>
        </div>
    </nav>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-80 border-r border-white/5 flex flex-col bg-[#0d0f12] shrink-0 sidebar-bg">
            <div class="p-5 border-b border-white/5">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Topics</h3>
                    <button onclick="createNewTopic()" class="p-1 hover:text-accent transition-colors"><i data-lucide="plus-circle" class="w-4 h-4"></i></button>
                </div>
                <div id="topicList" class="space-y-1 max-h-48 overflow-y-auto"></div>
            </div>

            <div class="flex-1 p-5 overflow-y-auto space-y-8">
                <div>
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Pipeline Status</h3>
                    <div id="pipelineDisplay" class="space-y-1"></div>
                </div>
                <div>
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Activity Stream</h3>
                    <div id="logStream" class="space-y-2 text-[10px] mono text-slate-500"></div>
                </div>
            </div>

            <div class="p-4 border-t border-white/5 bg-black/40">
                <textarea id="mainInput" placeholder="Initialize research vector..." 
                    class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-xs text-slate-200 placeholder:text-slate-600 focus:outline-none focus:ring-1 focus:ring-accent resize-none h-24 mb-3 transition-all"></textarea>
                
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <button onclick="runStep('scan')" class="px-3 py-2 rounded-lg border border-white/10 text-[10px] font-bold uppercase hover:bg-white/5 flex items-center justify-center gap-1">
                        <i data-lucide="zap" class="w-3 h-3 text-amber-400"></i> Quick Scan
                    </button>
                    <button onclick="runStep('research')" class="px-3 py-2 rounded-lg border border-white/10 text-[10px] font-bold uppercase hover:bg-white/5 flex items-center justify-center gap-1">
                        <i data-lucide="cpu" class="w-3 h-3 text-purple-400"></i> Deep Dive
                    </button>
                </div>
                <button id="runBtn" onclick="initiateResearch()" class="w-full btn-action py-3 rounded-xl text-xs flex items-center justify-center gap-2">
                    <i data-lucide="play" class="w-4 h-4"></i> Execute Automated Pipeline
                </button>
            </div>
        </aside>

        <!-- Right Canvas -->
        <section class="flex-1 flex flex-col relative overflow-hidden bg-[#050505]">
            <div class="absolute top-1/4 left-1/4 w-[600px] h-[600px] bg-accent/5 blur-[140px] rounded-full pointer-events-none"></div>

            <div class="h-12 flex items-center justify-between px-8 border-b border-white/5 shrink-0 z-10 glass">
                <div class="flex items-center gap-4 h-full">
                    <button class="text-xs font-semibold h-full px-2 border-b-2 border-accent">Synthesis Brief</button>
                    <button onclick="downloadActiveTopic()" class="text-xs font-semibold text-slate-500 hover:text-accent h-full px-2">Export .md</button>
                </div>
                <button onclick="clearCanvas()" class="p-1.5 text-slate-500 hover:text-red-400 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>

            <div id="canvas" class="flex-1 p-8 lg:p-16 overflow-y-auto z-10">
                <div id="briefContent" class="max-w-4xl mx-auto space-y-12 pb-20"></div>
            </div>
        </section>
    </main>

    <script>
        const PROVIDER_DEFAULTS = {
            Gemini: { url: 'https://generativelanguage.googleapis.com/v1beta/models/', portal: 'aistudio.google.com', link: 'https://aistudio.google.com', models: ['gemini-2.0-flash-exp', 'gemini-1.5-pro'] },
            OpenAI: { url: 'https://api.openai.com/v1', portal: 'platform.openai.com', link: 'https://platform.openai.com', models: ['gpt-4o', 'o1-preview'] },
            Claude: { url: 'https://api.anthropic.com/v1/messages', portal: 'console.anthropic.com', link: 'https://console.anthropic.com', models: ['claude-3-5-sonnet-latest'] },
            Custom: { url: 'https://openrouter.ai/api/v1', portal: 'OpenRouter / Groq / Ollama', link: 'https://openrouter.ai', models: [] }
        };

        let state = {
            providers: JSON.parse(localStorage.getItem('myres_providers') || '[]'),
            activeProviderId: localStorage.getItem('myres_active_id') || null,
            sources: JSON.parse(localStorage.getItem('myres_trusted_sources') || '[]'),
            topics: JSON.parse(localStorage.getItem('myres_topics') || '[]'),
            activeTopicId: localStorage.getItem('myres_active_topic') || null,
            theme: localStorage.getItem('myres_theme') || 'dark',
            currentTab: 'Gemini',
            phase: 'idle',
            editingProviderId: null
        };

        function refreshIcons() { lucide.createIcons(); }

        // --- CORE UI ---
        function setTheme(t) {
            state.theme = t;
            document.body.setAttribute('data-theme', t);
            localStorage.setItem('myres_theme', t);
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('bg-white/10', 'text-accent'));
            document.getElementById(`tbtn-${t}`).classList.add('bg-white/10', 'text-accent');
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.classList.toggle('hidden');
            if (id === 'settingsModal') { 
                switchTab(state.currentTab); 
                renderProviders(); 
                renderSources(); 
            }
        }

        function switchTab(tab) {
            state.currentTab = tab;
            document.querySelectorAll('.provider-tab').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            const def = PROVIDER_DEFAULTS[tab];
            
            // Logic for Custom vs Standard
            document.getElementById('customEndpointGroup').style.display = (tab === 'Custom') ? 'block' : 'none';
            document.getElementById('configUrl').value = def.url;
            document.getElementById('providerDisplayHint').innerText = tab;
            document.getElementById('providerDisplayHint').href = def.link;
            
            // Populate models if they aren't manually set
            if (def.models.length > 0) {
                document.getElementById('configModel').innerHTML = def.models.map(m => `<option value="${m}">${m}</option>`).join('');
            }
        }

        async function fetchModels() {
            const key = document.getElementById('configKey').value.trim();
            let url = document.getElementById('configUrl').value.trim();
            if (!key) return showToast("API Key required.");
            const btn = document.getElementById('fetchModelsBtn');
            btn.disabled = true;

            try {
                let fetchedModels = [];
                if (state.currentTab === 'Gemini') {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error?.message || "Failed");
                    fetchedModels = data.models.filter(m => m.supportedGenerationMethods.includes("generateContent")).map(m => m.name.split('/').pop());
                } else {
                    let fetchUrl = url.replace(/\/chat\/completions$/, '').replace(/\/$/, '') + '/models';
                    const res = await fetch(fetchUrl, { headers: { 'Authorization': `Bearer ${key}` }});
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error?.message || "Failed fetch from " + fetchUrl);
                    fetchedModels = data.data.map(m => m.id);
                }
                
                document.getElementById('configModel').innerHTML = fetchedModels.sort().map(m => `<option value="${m}">${m}</option>`).join('');
                showToast(`Found ${fetchedModels.length} models.`);
            } catch (e) {
                showToast(e.message);
            } finally { btn.disabled = false; }
        }

        // --- PROVIDER CRUD ---
        function saveProvider() {
            const name = document.getElementById('configName').value.trim() || state.currentTab;
            const url = document.getElementById('configUrl').value.trim();
            const key = document.getElementById('configKey').value.trim();
            const model = document.getElementById('configModel').value;

            if (!key || !model) {
                showToast("Missing API Key or Model selection.");
                return;
            }

            const payload = {
                id: state.editingProviderId || Date.now(),
                name: name,
                type: state.currentTab,
                url: url,
                key: key,
                model: model
            };

            if (state.editingProviderId) {
                // Update existing
                const idx = state.providers.findIndex(p => p.id === state.editingProviderId);
                state.providers[idx] = payload;
                showToast("Provider updated.");
            } else {
                // Create new
                state.providers.push(payload);
                if (!state.activeProviderId) state.activeProviderId = payload.id;
                showToast("Provider profile created.");
            }

            saveState();
            resetConfigForm();
            renderProviders();
            updateUI();
        }

        function editProvider(id) {
            const p = state.providers.find(x => x.id === id);
            if (!p) return;

            state.editingProviderId = id;
            document.getElementById('modalTitle').innerText = "Edit Provider: " + p.name;
            document.getElementById('configName').value = p.name;
            document.getElementById('configKey').value = p.key;
            
            // Switch tab to the correct type
            switchTab(p.type);
            document.getElementById('configUrl').value = p.url;
            
            // Populate model list if empty, and set value
            const modelSelect = document.getElementById('configModel');
            if (!Array.from(modelSelect.options).some(opt => opt.value === p.model)) {
                modelSelect.innerHTML = `<option value="${p.model}">${p.model}</option>` + modelSelect.innerHTML;
            }
            modelSelect.value = p.model;
        }

        function resetConfigForm() {
            state.editingProviderId = null;
            document.getElementById('modalTitle').innerText = "API Configuration";
            document.getElementById('configName').value = "";
            document.getElementById('configKey').value = "";
            switchTab('Gemini');
        }

        function renderProviders() {
            document.getElementById('providerList').innerHTML = state.providers.map(p => `
                <div class="flex items-center gap-4 p-4 rounded border ${state.activeProviderId == p.id ? 'border-accent bg-accent/5' : 'border-white/5 bg-white/5'}">
                    <div class="flex-1 text-xs">
                        <div class="font-bold flex items-center gap-2">
                            ${p.name}
                            <span class="text-[9px] px-1 bg-white/10 rounded uppercase opacity-50 font-normal">${p.type}</span>
                        </div>
                        <div class="mono opacity-60 text-[10px] truncate max-w-[200px]">${p.model}</div>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="setActiveProvider(${p.id})" class="px-2 py-1 rounded border border-white/10 text-[9px] uppercase hover:bg-white/5 ${state.activeProviderId == p.id ? 'text-accent border-accent' : ''}">
                            ${state.activeProviderId == p.id ? 'active' : 'use'}
                        </button>
                        <button onclick="editProvider(${p.id})" class="px-2 py-1 rounded border border-white/10 text-[9px] uppercase hover:text-accent hover:border-accent">
                            edit
                        </button>
                        <button onclick="deleteProvider(${p.id})" class="px-2 py-1 rounded text-red-500 font-bold hover:bg-red-500/10">×</button>
                    </div>
                </div>
            `).join('') || '<p class="text-[9px] text-slate-600 text-center py-4">No providers configured.</p>';
            refreshIcons();
        }

        function setActiveProvider(id) { state.activeProviderId = id; saveState(); renderProviders(); updateUI(); }
        
        function deleteProvider(id) { 
            if(confirm("Permanently delete this provider?")) {
                state.providers = state.providers.filter(x => x.id != id); 
                if(state.activeProviderId == id) state.activeProviderId = state.providers[0]?.id || null; 
                saveState(); renderProviders(); updateUI(); 
            }
        }

        // --- TOPICS ---
        function createNewTopic() {
            const title = prompt("Topic Title:", "Project " + (state.topics.length + 1));
            if (!title) return;
            const nt = { id: Date.now(), title, brief: null, validation: null, logs: [], date: new Date().toISOString() };
            state.topics.unshift(nt);
            state.activeTopicId = nt.id;
            saveState(); renderTopics(); loadActiveTopic();
        }

        function switchTopic(id) { state.activeTopicId = id; saveState(); renderTopics(); loadActiveTopic(); }
        function deleteTopic(id) { if(confirm("Delete research?")) { state.topics = state.topics.filter(t=>t.id!=id); if(state.activeTopicId==id) state.activeTopicId=null; saveState(); renderTopics(); loadActiveTopic(); }}

        function renderTopics() {
            document.getElementById('topicList').innerHTML = state.topics.map(t => `
                <div onclick="switchTopic(${t.id})" class="topic-item group flex items-center justify-between px-3 py-2 rounded-lg cursor-pointer transition-all ${state.activeTopicId == t.id ? 'active font-bold' : 'text-slate-400'}">
                    <span class="truncate">${t.title}</span>
                    <button onclick="event.stopPropagation(); deleteTopic(${t.id})" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-400">×</button>
                </div>
            `).join('') || '<p class="text-[10px] text-slate-600 text-center py-4 italic">No research topics.</p>';
            refreshIcons();
        }

        function loadActiveTopic() {
            const t = state.topics.find(x => x.id == state.activeTopicId);
            const c = document.getElementById('briefContent');
            const s = document.getElementById('logStream');
            s.innerHTML = '';
            if (t) {
                if (t.brief) renderCanvas(t.title, t.brief, t.validation);
                else c.innerHTML = `<div class="text-center py-20 opacity-20 text-sm mono">Awaiting vector for: ${t.title}</div>`;
                t.logs.forEach(l => addLog(l.type, l.msg, false));
            } else { c.innerHTML = '<div class="text-center py-20 opacity-20 text-sm mono">Select or create a topic.</div>'; }
        }

        // --- RESEARCH PIPELINE ---
        async function callAI(prompt, system) {
            const p = state.providers.find(x => x.id == state.activeProviderId);
            if (!p || !p.key || !p.model) throw new Error("Ensure an active Provider is configured and has a model.");
            
            const isGemini = p.type === 'Gemini' || p.url.includes('generativelanguage');
            let url = isGemini ? `${p.url}${p.model}:generateContent?key=${p.key}` : p.url;
            if (!isGemini && !url.endsWith('/chat/completions')) url = url.replace(/\/$/, '') + '/chat/completions';

            const headers = { 'Content-Type': 'application/json' };
            if (!isGemini) headers['Authorization'] = `Bearer ${p.key}`;

            const body = isGemini ? {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: system }] }
            } : {
                model: p.model,
                messages: [{ role: "system", content: system }, { role: "user", content: prompt }]
            };

            const response = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || "LLM Request Stalled");
            return isGemini ? data.candidates?.[0]?.content?.parts?.[0]?.text : data.choices?.[0]?.message?.content;
        }

        async function runStep(stepType) {
            const query = document.getElementById('mainInput').value.trim();
            if (!query) return showToast("Enter a query.");
            if (!state.activeTopicId) createNewTopic();
            
            try {
                state.phase = stepType; updateUI();
                if (stepType === 'scan') {
                    addLog('SYSTEM', 'Performing Quick Scan (Triage)...');
                    const res = await callAI(query, "Triage Agent. Identify the top 3 high-value research themes. Explicitly evaluate the 'Semantic Potential' of the query. Be technical and concise.");
                    addLog('AI', "Scan Result: " + res.substring(0, 150) + "...");
                } else if (stepType === 'research') {
                    addLog('SYSTEM', 'Initiating Multidimensional Synthesis...');
                    const res = await callAI(query, "Research Scientist. Perform a multidimensional technical synthesis. Extract emergent patterns and non-obvious cross-domain links. Deliver in structured Markdown.");
                    const t = state.topics.find(x => x.id == state.activeTopicId);
                    t.brief = res; saveState(); loadActiveTopic();
                }
            } catch (e) { addLog('ERROR', e.message); }
            finally { state.phase = 'idle'; updateUI(); }
        }

        async function initiateResearch() {
            const query = document.getElementById('mainInput').value.trim();
            if (!query) return;
            const btn = document.getElementById('runBtn');
            btn.disabled = true;

            try {
                // A: SCAN
                state.phase = 'scan'; updateUI();
                addLog('SYSTEM', 'Phase A: Performing Quick Scan...');
                const scan = await callAI(query, "Triage Agent. 1. Core Themes. 2. Semantic Potential analysis. 3. Signal-to-Noise estimation. High technical density.");
                
                // B: DEEP RESEARCH
                state.phase = 'research'; updateUI();
                addLog('AI', 'Phase B: Generating Multidimensional Synthesis...');
                const brief = await callAI(`Query: ${query}. Scan Data: ${scan}`, "Research Scientist. Detailed multidimensional synthesis. Identify latent patterns. Use high-precision language. Markdown format.");

                // C: VALIDATION
                state.phase = 'validate'; updateUI();
                const sources = state.sources.join(', ');
                addLog('SYSTEM', 'Phase C: Forensic Claim Validation...');
                const valid = await callAI(`Report: ${brief}. Grounding domains: ${sources}`, "Forensic Fact Checker. Extract atomic claims. Label: VERIFIED / CONTRADICTED / UNCERTAIN. Final Signal-to-Noise ratio check.");

                const t = state.topics.find(x => x.id == state.activeTopicId);
                if (t) { t.brief = brief; t.validation = valid; saveState(); renderCanvas(t.title, brief, valid); }
                showToast("Research Pipeline Finalized.");
            } catch (e) { addLog('ERROR', e.message); }
            finally { state.phase = 'idle'; btn.disabled = false; updateUI(); }
        }

        function renderCanvas(title, report, validation) {
            document.getElementById('briefContent').innerHTML = `
                <div class="animate-in fade-in slide-in-from-bottom-4 duration-700">
                    <h1 class="text-4xl font-bold mb-8 gradient-text">${title}</h1>
                    <div class="space-y-12">
                        <div class="p-8 rounded-xl glass border-accent/20">
                            <h2 class="text-xl font-bold text-accent mb-6 flex items-center gap-2"><i data-lucide="file-text"></i> Synthesis Report</h2>
                            <div class="text-sm leading-relaxed whitespace-pre-wrap">${report}</div>
                        </div>
                        <div class="p-6 rounded-xl border border-emerald-500/20 bg-emerald-500/5">
                            <h3 class="text-emerald-500 font-bold text-[10px] uppercase tracking-widest mb-4 flex items-center gap-2"><i data-lucide="shield-check" class="w-4 h-4"></i> Claim & Signal Analysis</h3>
                            <div class="text-[11px] italic opacity-80">${validation}</div>
                        </div>
                    </div>
                </div>
            `;
            refreshIcons();
        }

        // --- UTILS ---
        function addSource() { const v = document.getElementById('newSource').value.trim(); if(v){ state.sources.push(v); document.getElementById('newSource').value=''; saveState(); renderSources(); }}
        function renderSources() { document.getElementById('sourceList').innerHTML = state.sources.map(s => `<div class="bg-white/5 border border-white/10 rounded px-2 py-1 text-[10px] mono flex items-center gap-2"><span>${s}</span><button onclick="state.sources=state.sources.filter(x=>x!='${s}');saveState();renderSources();">×</button></div>`).join(''); }
        
        function saveState() {
            localStorage.setItem('myres_providers', JSON.stringify(state.providers));
            localStorage.setItem('myres_active_id', state.activeProviderId);
            localStorage.setItem('myres_trusted_sources', JSON.stringify(state.sources));
            localStorage.setItem('myres_topics', JSON.stringify(state.topics));
            localStorage.setItem('myres_active_topic', state.activeTopicId);
        }

        function updateUI() {
            const p = state.providers.find(x => x.id == state.activeProviderId);
            document.getElementById('activeProviderTag').innerHTML = p ? `<span class="w-2 h-2 rounded-full bg-accent inline-block mr-1"></span> ${p.name}` : '<span class="text-red-400">NO ACTIVE PROVIDER</span>';
            const pipeline = document.getElementById('pipelineDisplay');
            const steps = [{ id: 'scan', name: 'Quick Scan', icon: 'zap' }, { id: 'research', name: 'Deep Research', icon: 'cpu' }, { id: 'validate', name: 'Claim Validation', icon: 'shield-check' }];
            pipeline.innerHTML = steps.map(s => `<div class="flex items-center gap-3 p-2 rounded-lg transition-all ${state.phase === s.id ? 'bg-accent/10 text-accent border border-accent/20' : 'text-slate-500'}"><i data-lucide="${s.icon}" class="w-4 h-4"></i><span class="text-xs font-semibold">${s.name}</span></div>`).join('');
            refreshIcons();
        }

        function addLog(type, msg, save=true) {
            const s = document.getElementById('logStream');
            const l = document.createElement('div');
            l.className = 'flex gap-2 mb-1';
            l.innerHTML = `<span class="uppercase ${type === 'AI' ? 'text-accent' : 'text-slate-500'} font-bold">[${type}]</span> <span>${msg}</span>`;
            s.prepend(l);
            if(save && state.activeTopicId) { 
                const t = state.topics.find(x => x.id == state.activeTopicId);
                if (t) t.logs.push({type, msg}); 
                saveState(); 
            }
        }

        function downloadActiveTopic() {
            const t = state.topics.find(x => x.id == state.activeTopicId);
            if (!t || !t.brief) return showToast("Nothing to export.");
            const content = `# ${t.title}\n\n${t.brief}\n\n## Validation\n${t.validation}`;
            const blob = new Blob([content], { type: 'text/markdown' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${t.title.replace(/\s+/g, '-')}.md`; a.click();
        }

        function clearCanvas() { const t=state.topics.find(x=>x.id==state.activeTopicId); if(t){ t.brief=null; t.logs=[]; saveState(); loadActiveTopic(); }}
        function showToast(m) { const t = document.getElementById('toast'); document.getElementById('toastMessage').innerText = m; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'), 3000); }
        function toggleKeyVisibility() { const i = document.getElementById('configKey'); i.type = i.type === 'password' ? 'text' : 'password'; }

        window.onload = () => { 
            setTheme(state.theme); 
            renderTopics(); 
            loadActiveTopic(); 
            updateUI(); 
            refreshIcons();
            document.getElementById('mainInput').addEventListener('keydown', (e) => { 
                if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') initiateResearch(); 
            });
        };
    </script>
</body>
</html>
