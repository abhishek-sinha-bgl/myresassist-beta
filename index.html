<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MyResAssist</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:#e5e7eb;
display:flex;
height:100vh;
}

/* SIDEBAR */

#sidebar{
width:230px;
background:#0b1220;
padding:16px;
display:flex;
flex-direction:column;
}

.topic{
background:#1e293b;
padding:10px;
border-radius:6px;
margin-top:6px;
cursor:pointer;
}

/* MAIN */

#main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

#header{
height:52px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
background:#0b1220;
}

.iconBtn{
background:none;
border:none;
cursor:pointer;
color:white;
margin-left:10px;
}

/* WORKSPACE */

#workspace{
flex:1;
display:flex;
}

/* RESEARCH */

#research{
flex:2;
padding:20px;
overflow:auto;
}

/* RADAR */

#radar{
background:#1e293b;
padding:10px;
border-radius:8px;
margin-bottom:16px;
}

/* CLAIMS */

.claim{
background:#1e293b;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

.claim button{
margin-top:8px;
margin-right:6px;
}

/* CHAT */

#chatpane{
width:360px;
background:#0b1220;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow:auto;
padding:12px;
}

textarea{
width:100%;
height:70px;
background:#1e293b;
border:none;
color:white;
padding:6px;
border-radius:6px;
}

/* SETTINGS */

#settings{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#0b1220;
padding:20px;
border-radius:10px;
display:none;
width:420px;
}

input,select{
width:100%;
padding:8px;
margin-top:4px;
border-radius:6px;
border:none;
}

button{
background:#3b82f6;
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="sidebar">

<h3>MyResAssist</h3>

<button onclick="createTopic()">New Topic</button>

<div id="topics"></div>

</div>

<div id="main">

<div id="header">

<div id="topicTitle">Select Topic</div>

<div>

<button class="iconBtn" onclick="toggleTheme()">
<i data-lucide="moon"></i>
</button>

<button class="iconBtn" onclick="globalSearch()">
<i data-lucide="search"></i>
</button>

<button class="iconBtn" onclick="openSettings()">
<i data-lucide="settings"></i>
</button>

</div>

</div>

<div id="workspace">

<div id="research">

<div id="radar">Research radar will appear here</div>

<select onchange="sortClaims(this.value)">
<option value="new">Newest</option>
<option value="old">Oldest</option>
<option value="high">Highest Confidence</option>
<option value="low">Lowest Confidence</option>
</select>

<div id="claims"></div>

</div>

<div id="chatpane">

<div id="chat"></div>

<div style="padding:10px">

<textarea id="query" disabled placeholder="Select a topic first"></textarea>

<button onclick="quickScan()" id="quickBtn" disabled>Quick Scan</button>
<button onclick="deepResearch()" id="deepBtn" disabled>Deep Research</button>

</div>

</div>

</div>

</div>

<div id="settings">

<h3>API Provider</h3>

<label>Endpoint</label>
<input id="endpoint">

<label>API Key</label>
<input id="apikey" type="password">

<label>Model</label>
<select id="model"></select>

<button onclick="fetchModels()">Fetch Models</button>

<br><br>

<button onclick="saveSettings()">Save</button>
<button onclick="closeSettings()">Close</button>

</div>

<script>

lucide.createIcons()

let settings=JSON.parse(localStorage.getItem("settings")||"{}")
let topics=JSON.parse(localStorage.getItem("topics")||"[]")

let currentTopic=null

function createTopic(){

let name=prompt("Topic")

if(!name)return

let t={id:Date.now(),title:name,claims:[]}

topics.push(t)

saveTopics()

renderTopics()

}

function renderTopics(){

let box=document.getElementById("topics")

box.innerHTML=""

topics.forEach(t=>{

let d=document.createElement("div")

d.className="topic"

d.innerText=t.title

d.onclick=()=>openTopic(t.id)

box.appendChild(d)

})

}

function openTopic(id){

currentTopic=topics.find(t=>t.id==id)

document.getElementById("topicTitle").innerText=currentTopic.title

document.getElementById("query").disabled=false
document.getElementById("quickBtn").disabled=false
document.getElementById("deepBtn").disabled=false

renderClaims()

}

function saveTopics(){
localStorage.setItem("topics",JSON.stringify(topics))
}

function renderClaims(){

let box=document.getElementById("claims")

box.innerHTML=""

if(!currentTopic)return

currentTopic.claims.forEach((c,i)=>{

let card=document.createElement("div")

card.className="claim"

card.innerHTML=

`<b>${c.claim}</b><br>
Confidence: ${c.confidence}<br>
Evidence: ${c.evidence}

<br>

<button onclick="validateClaim(${i})">Validate</button>
<button onclick="deleteClaim(${i})">✕</button>`

box.appendChild(card)

})

updateRadar()

}

function deleteClaim(i){

currentTopic.claims.splice(i,1)

saveTopics()

renderClaims()

}

function sortClaims(mode){

if(!currentTopic)return

if(mode=="high"){

let map={high:3,medium:2,low:1}

currentTopic.claims.sort((a,b)=>map[b.confidence]-map[a.confidence])

}

renderClaims()

}

function updateRadar(){

let radar=document.getElementById("radar")

radar.innerText="Claims in topic: "+currentTopic.claims.length

}

async function quickScan(){

runResearch(document.getElementById("query").value)

}

async function deepResearch(){

runResearch("Deep research: "+document.getElementById("query").value)

}

async function validateClaim(i){

let claim=currentTopic.claims[i].claim

runResearch("Validate this claim: "+claim)

}

async function runResearch(prompt){

if(!currentTopic){

alert("Select a topic")

return

}

try{

let endpoint=settings.endpoint.replace("/chat/completions","")

let r=await fetch(endpoint+"/chat/completions",{

method:"POST",

headers:{
"Authorization":"Bearer "+settings.key,
"Content-Type":"application/json",
"HTTP-Referer":"https://github.io",
"X-Title":"MyResAssist"
},

body:JSON.stringify({

model:settings.model,

messages:[{role:"user",content:

`Extract factual claims from this text as JSON.

${prompt}

Return:

[
{claim:"",confidence:"high|medium|low",evidence:""}
]

`}]

})

})

let j=await r.json()

let text=j.choices[0].message.content

let claims=JSON.parse(text)

claims.forEach(c=>currentTopic.claims.push(c))

saveTopics()

renderClaims()

}catch(e){

alert("Research failed")

}

}

function openSettings(){

document.getElementById("settings").style.display="block"

}

function closeSettings(){

document.getElementById("settings").style.display="none"

}

async function fetchModels(){

let endpoint=document.getElementById("endpoint").value

let key=document.getElementById("apikey").value

let r=await fetch(endpoint.replace("/chat/completions","")+"/models",{

headers:{

Authorization:"Bearer "+key,

"HTTP-Referer":"https://github.io",

"X-Title":"MyResAssist"

}

})

let j=await r.json()

let models=j.data.sort((a,b)=>a.id.localeCompare(b.id))

let sel=document.getElementById("model")

sel.innerHTML=""

models.forEach(m=>{

let o=document.createElement("option")

o.value=m.id

o.innerText=m.id

sel.appendChild(o)

})

}

function saveSettings(){

settings.endpoint=document.getElementById("endpoint").value
settings.key=document.getElementById("apikey").value
settings.model=document.getElementById("model").value

localStorage.setItem("settings",JSON.stringify(settings))

closeSettings()

}

renderTopics()

</script>

</body>
</html>
