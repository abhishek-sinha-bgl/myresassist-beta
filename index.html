<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MyResAssist</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:#e5e7eb;
display:flex;
height:100vh;
}

/* layout */

#app{
display:flex;
width:100%;
gap:16px;
padding:10px;
box-sizing:border-box;
}

/* sidebar */

#sidebar{
width:220px;
background:#0b1220;
padding:14px;
border-radius:8px;
}

.topic{
background:#1e293b;
padding:8px;
border-radius:6px;
margin-top:6px;
cursor:pointer;
}

/* research */

#research{
flex:2;
background:#0b1220;
padding:14px;
border-radius:8px;
overflow:auto;
}

.claim{
background:#1e293b;
padding:10px;
border-radius:6px;
margin-top:10px;
}

/* chat */

#chatpane{
width:360px;
background:#0b1220;
border-radius:8px;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
padding:12px;
overflow:auto;
}

textarea{
width:100%;
height:70px;
background:#1e293b;
border:none;
color:white;
border-radius:6px;
padding:6px;
}

button{
background:#3b82f6;
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
cursor:pointer;
margin-top:6px;
}

</style>
</head>

<body>

<div id="app">

<div id="sidebar">

<h3>MyResAssist</h3>

<button onclick="createTopic()">New Topic</button>

<div id="topics"></div>

</div>

<div id="research">

<h3 id="topicTitle">Select a topic</h3>

<div id="claims"></div>

</div>

<div id="chatpane">

<div id="chat"></div>

<div style="padding:10px">

<textarea id="query" disabled placeholder="Select a topic to begin research"></textarea>

<button id="quickBtn" disabled onclick="quickScan()">Quick Scan</button>

<button id="deepBtn" disabled onclick="deepResearch()">Deep Research</button>

</div>

</div>

</div>

<script>

lucide.createIcons()

let settings=JSON.parse(localStorage.getItem("settings")||"{}")
let topics=JSON.parse(localStorage.getItem("topics")||"[]")
let currentTopic=null

function createTopic(){

let name=prompt("Topic name")

if(!name)return

let t={id:Date.now(),title:name,claims:[]}

topics.push(t)

saveTopics()

renderTopics()

}

function renderTopics(){

let box=document.getElementById("topics")

box.innerHTML=""

topics.forEach(t=>{

let d=document.createElement("div")

d.className="topic"

d.innerText=t.title

d.onclick=()=>openTopic(t.id)

box.appendChild(d)

})

}

function openTopic(id){

currentTopic=topics.find(t=>t.id==id)

document.getElementById("topicTitle").innerText=currentTopic.title

document.getElementById("query").disabled=false
document.getElementById("quickBtn").disabled=false
document.getElementById("deepBtn").disabled=false

renderClaims()

}

function saveTopics(){
localStorage.setItem("topics",JSON.stringify(topics))
}

function renderClaims(){

let box=document.getElementById("claims")

box.innerHTML=""

if(!currentTopic)return

currentTopic.claims.forEach((c,i)=>{

let card=document.createElement("div")

card.className="claim"

card.innerHTML=

`<b>${c.claim}</b><br>
Confidence: ${c.confidence}<br>
Evidence: ${c.evidence}`

box.appendChild(card)

})

}

function safeParseJSON(text){

try{

let start=text.indexOf("[")
let end=text.lastIndexOf("]")

if(start!==-1 && end!==-1){

return JSON.parse(text.substring(start,end+1))

}

}catch(e){}

return null

}

async function runResearch(prompt){

try{

let endpoint=settings.endpoint.replace("/chat/completions","")

let body={
model:settings.model,
messages:[
{role:"user",content:

`Extract factual claims from this text.

Return ONLY JSON:

[
 {claim:"",confidence:"high|medium|low",evidence:""}
]

Text:
${prompt}`

}
]
}

let r=await fetch(endpoint+"/chat/completions",{

method:"POST",

headers:{
"Authorization":"Bearer "+settings.key,
"Content-Type":"application/json",
"HTTP-Referer":"https://github.io",
"X-Title":"MyResAssist"
},

body:JSON.stringify(body)

})

let j=await r.json()

if(!j.choices){

alert(j.error?.message || "API error")

return

}

let text=j.choices[0].message.content

let claims=safeParseJSON(text)

if(!claims){

claims=[{
claim:text.substring(0,150),
confidence:"unknown",
evidence:"model response"
}]

}

claims.forEach(c=>currentTopic.claims.push(c))

saveTopics()

renderClaims()

}catch(e){

alert("Network or CORS error")

}

}

function quickScan(){

runResearch(document.getElementById("query").value)

}

function deepResearch(){

runResearch("Deep analysis: "+document.getElementById("query").value)

}

renderTopics()

</script>

</body>
</html>
