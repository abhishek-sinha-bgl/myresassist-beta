<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyResAssist | Research Lab V4.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --bg-deep: #0a0b0e;
            --bg-sidebar: #0d0f12;
            --bg-card: rgba(17, 20, 24, 0.9);
            --accent: #00d1ff;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --font-primary: 'Inter', sans-serif;
            --border-val: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg-deep: #f8fafc;
            --bg-sidebar: #f1f5f9;
            --bg-card: rgba(255, 255, 255, 0.95);
            --accent: #2563eb;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --border-val: rgba(0, 0, 0, 0.1);
        }

        [data-theme="academic"] {
            --bg-deep: #fdfbf7;
            --bg-sidebar: #f4f1ea;
            --bg-card: #ffffff;
            --accent: #7c2d12;
            --text-main: #1a1a1a;
            --text-dim: #57534e;
            --font-primary: 'Noto Serif', serif;
            --border-val: rgba(0, 0, 0, 0.15);
        }

        body { background-color: var(--bg-deep); color: var(--text-main); font-family: var(--font-primary); overflow: hidden; transition: background-color 0.3s ease; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--border-val); }
        
        .input-dark { 
            background: rgba(0, 0, 0, 0.2); 
            border: 1px solid var(--border-val); 
            border-radius: 8px; 
            transition: all 0.2s; 
            color: inherit; 
            font-size: 0.75rem;
            font-weight: 500;
        }
        .input-dark:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 1px var(--accent); }
        
        /* Layout & Resizing */
        .side-pane { position: relative; transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s; overflow: hidden; }
        .side-pane.resizing { transition: none !important; }
        .side-pane.collapsed { width: 0 !important; opacity: 0; pointer-events: none; border: none !important; }

        .resizer {
            width: 4px;
            cursor: col-resize;
            background: transparent;
            transition: background 0.2s;
            position: relative;
            z-index: 40;
            flex-shrink: 0;
        }
        .resizer:hover, .resizer.active { background: var(--accent); }

        .btn-outline { border: 1px solid var(--border-val); color: var(--text-dim); transition: all 0.2s; font-size: 0.75rem; font-weight: 700; }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: rgba(0, 209, 255, 0.05); }
        .btn-action { background: var(--accent); color: #000; font-weight: 800; transition: all 0.2s; }
        
        .topic-item { border-left: 3px solid transparent; }
        .topic-item.active { background: rgba(0, 209, 255, 0.08); border-left: 3px solid var(--accent); color: var(--accent); font-weight: 800; }
        .tab-btn { border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab-btn.active { border-bottom: 2px solid var(--accent); color: var(--accent); }
        .modal-tab.active { border-bottom: 2px solid var(--accent); color: white !important; font-weight: 800; }

        .synthesis-rendered h1 { font-size: 3rem; font-weight: 900; margin-bottom: 2.5rem; color: var(--accent); line-height: 1; }
        .synthesis-rendered h2 { font-size: 1.8rem; font-weight: 800; margin-top: 3.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-val); padding-bottom: 0.5rem; }
        .synthesis-rendered p { margin-bottom: 1.5rem; line-height: 1.8; opacity: 0.9; }

        .claim-card { border: 1px solid var(--border-val); transition: all 0.3s; }
        .claim-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px -10px var(--accent); }

        /* Cognitive Pulse dots */
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .dot { display: inline-block; animation: blink 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-val); border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col" data-theme="dark">

    <!-- Top Navigation -->
    <nav class="h-14 border-b border-white/5 flex items-center justify-between px-4 glass shrink-0 z-50">
        <div class="flex items-center gap-2">
            <button onclick="togglePane('left')" class="p-2 hover:text-accent transition-colors" title="Toggle Discovery Tree">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
            <div class="flex items-center gap-2 ml-1">
                <div class="w-7 h-7 bg-indigo-600 rounded flex items-center justify-center font-bold text-white shadow-lg">R</div>
                <span class="font-bold tracking-tight text-sm hidden sm:block uppercase tracking-tighter">MyResAssist Lab</span>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <div id="activeProviderTag" class="text-[9px] font-black mono text-slate-400 hidden lg:flex items-center gap-2 px-3 py-1 bg-white/5 rounded-full border border-white/5 uppercase"></div>
            
            <div class="flex items-center bg-black/20 rounded-lg p-0.5 border border-white/10">
                <button onclick="setTheme('dark')" class="p-1.5 rounded theme-btn" id="tbtn-dark"><i data-lucide="moon" class="w-3.5 h-3.5"></i></button>
                <button onclick="setTheme('light')" class="p-1.5 rounded theme-btn" id="tbtn-light"><i data-lucide="sun" class="w-3.5 h-3.5"></i></button>
                <button onclick="setTheme('academic')" class="p-1.5 rounded theme-btn" id="tbtn-academic"><i data-lucide="book" class="w-3.5 h-3.5"></i></button>
            </div>
            
            <button onclick="toggleModal('settingsModal')" class="text-slate-400 hover:text-accent p-2 transition-colors"><i data-lucide="settings" class="w-4 h-4"></i></button>
            
            <button onclick="togglePane('right')" class="p-2 hover:text-accent transition-colors" title="Toggle Command Center">
                <i data-lucide="layout-panel-right" class="w-5 h-5"></i>
            </button>
        </div>
    </nav>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm">
        <div class="glass w-full max-w-3xl h-[640px] rounded-3xl p-0 modal-enter overflow-hidden border border-white/10 shadow-2xl flex flex-col transition-all">
            <div class="p-6 border-b border-white/5 flex justify-between items-center shrink-0 bg-white/5">
                <h2 class="text-xl font-black tracking-tighter uppercase">Lab Command Center</h2>
                <button onclick="toggleModal('settingsModal')" class="text-slate-500 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            
            <div class="flex bg-black/20 px-8 gap-8 border-b border-white/5 shrink-0">
                <button onclick="switchSettingsTab('providers')" class="modal-tab py-4 text-[10px] font-bold uppercase tracking-widest text-slate-500 active" id="stab-providers">API Providers</button>
                <button onclick="switchSettingsTab('sources')" class="modal-tab py-4 text-[10px] font-bold uppercase tracking-widest text-slate-500" id="stab-sources">Authoritative Sources</button>
                <button onclick="switchSettingsTab('themes')" class="modal-tab py-4 text-[10px] font-bold uppercase tracking-widest text-slate-500" id="stab-themes">Themes</button>
            </div>

            <div class="flex-1 overflow-y-auto p-8 no-scrollbar bg-black/10">
                <div id="settings-providers" class="settings-content space-y-6">
                    <div class="flex items-center justify-between p-4 bg-accent/5 rounded-2xl border border-accent/20 mb-6">
                        <div>
                            <h3 class="text-xs font-bold uppercase text-accent">Parallel Synthesis</h3>
                            <p class="text-[10px] text-slate-400 italic">Query all configured 'Worker' agents simultaneously.</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="multiLlmToggle" class="sr-only peer" onchange="saveState()">
                            <div class="w-10 h-5 bg-slate-700 rounded-full peer peer-checked:bg-accent after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>
                        </label>
                    </div>
                    <div class="flex gap-4 border-b border-white/5 pb-4 mb-6">
                        <button onclick="switchProviderBrand('Claude')" class="brand-tab text-[10px] font-bold uppercase tracking-wider text-slate-500" id="b-Claude">Claude</button>
                        <button onclick="switchProviderBrand('OpenAI')" class="brand-tab text-[10px] font-bold uppercase tracking-wider text-slate-500" id="b-OpenAI">OpenAI</button>
                        <button onclick="switchProviderBrand('Gemini')" class="brand-tab text-[10px] font-bold uppercase tracking-wider text-slate-500" id="b-Gemini">Gemini</button>
                        <button onclick="switchProviderBrand('Custom')" class="brand-tab text-[10px] font-bold uppercase tracking-wider text-slate-500" id="b-Custom">Custom</button>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col gap-1.5"><label class="text-[9px] uppercase font-bold text-slate-500 ml-1">Label</label><input id="configName" type="text" class="input-dark p-3" placeholder="Profile Name"></div>
                        <div class="flex flex-col gap-1.5"><label class="text-[9px] uppercase font-bold text-slate-500 ml-1">Role</label><select id="configRole" class="input-dark p-3"><option value="worker">Worker</option><option value="orchestrator">Orchestrator</option></select></div>
                        <div class="flex flex-col gap-1.5 col-span-2"><label class="text-[9px] uppercase font-bold text-slate-500 ml-1">API Endpoint</label><input id="configUrl" type="text" class="input-dark p-3 mono" placeholder="https://api.openai.com/v1"></div>
                        <div class="flex flex-col gap-1.5"><label class="text-[9px] uppercase font-bold text-slate-500 ml-1">Secret Key</label><input id="configKey" type="password" class="input-dark p-3 mono" placeholder="sk-..."></div>
                        <div class="flex flex-col gap-1.5"><label class="text-[9px] uppercase font-bold text-slate-500 ml-1">Model ID</label><select id="configModel" class="input-dark p-3 mono"></select></div>
                    </div>
                    <div class="flex justify-between items-center pt-6 border-t border-white/5">
                        <button onclick="fetchModels()" class="btn-outline px-4 py-2 rounded-xl text-[10px] uppercase font-black">Sync Models</button>
                        <button onclick="saveProvider()" class="btn-action px-6 py-2 rounded-xl text-xs uppercase font-black">Commit Agent</button>
                    </div>
                    <div id="providerList" class="space-y-2 mt-8"></div>
                </div>
                <div id="settings-sources" class="settings-content hidden space-y-6">
                    <h3 class="text-xs font-black uppercase tracking-widest text-accent">Authoritative Sources</h3>
                    <div class="flex gap-2">
                        <input id="newSource" type="text" placeholder="e.g. imf.org, worldbank.org, .edu" class="flex-1 input-dark p-3">
                        <button onclick="addSource()" class="btn-action px-6 rounded-xl text-xs uppercase font-black">+ Add</button>
                    </div>
                    <div id="sourceList" class="flex flex-wrap gap-2 mt-4"></div>
                </div>
                <div id="settings-themes" class="settings-content hidden space-y-8">
                    <div class="grid grid-cols-3 gap-4">
                        <button onclick="setTheme('dark')" class="p-6 rounded-2xl border border-white/5 bg-[#0a0b0e] text-center hover:border-accent group transition-all"><i data-lucide="moon" class="mx-auto mb-2 text-slate-400 group-hover:text-accent"></i><div class="text-[10px] font-black uppercase">Night</div></button>
                        <button onclick="setTheme('light')" class="p-6 rounded-2xl border border-white/5 bg-[#f8fafc] text-center hover:border-accent group transition-all"><i data-lucide="sun" class="mx-auto mb-2 text-slate-900 group-hover:text-accent"></i><div class="text-[10px] font-black uppercase text-slate-900">Light</div></button>
                        <button onclick="setTheme('academic')" class="p-6 rounded-2xl border border-white/5 bg-[#f4f1ea] text-center hover:border-accent group transition-all"><i data-lucide="book" class="mx-auto mb-2 text-slate-900 group-hover:text-accent"></i><div class="text-[10px] font-black uppercase text-slate-900">Paper</div></button>
                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-white/5 shrink-0 flex justify-end bg-white/5">
                <button onclick="toggleModal('settingsModal')" class="px-8 py-2.5 rounded-xl text-xs text-slate-400 font-bold hover:text-white">Close Settings</button>
            </div>
        </div>
    </div>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden">
        <aside id="leftPane" class="side-pane w-72 border-r border-white/5 flex flex-col bg-[#0d0f12] shrink-0" style="width: 288px;">
            <div class="p-5 border-b border-white/5">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Discovery Tree</h3>
                    <button onclick="createNewTopic()" class="p-1 hover:text-accent transition-colors"><i data-lucide="plus-circle" class="w-4 h-4"></i></button>
                </div>
                <div class="relative mb-2">
                    <input type="text" id="topicSearch" oninput="renderTopics()" placeholder="Search projects..." class="w-full bg-black/20 border border-white/5 rounded-lg py-1.5 px-3 text-[11px] focus:outline-none focus:border-accent/50 text-white">
                    <i data-lucide="search" class="absolute right-3 top-2 w-3 h-3 opacity-30"></i>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-1 no-scrollbar" id="topicList"></div>
            <div class="p-4 border-t border-white/5 bg-black/20">
                <button onclick="toggleArchiveView()" id="archiveToggleBtn" class="w-full text-[9px] font-black uppercase tracking-widest text-slate-500 hover:text-accent py-2 transition-all">View Archive</button>
            </div>
        </aside>

        <div id="leftResizer" class="resizer"></div>

        <section class="flex-1 flex flex-col relative overflow-hidden bg-[#050505]">
            <div class="absolute top-1/4 left-1/4 w-[600px] h-[600px] bg-accent/5 blur-[140px] rounded-full pointer-events-none"></div>
            <div class="h-12 flex items-center px-8 border-b border-white/5 shrink-0 z-10 glass gap-8">
                <button onclick="switchCenterTab('synthesis')" class="tab-btn active text-[10px] uppercase font-black tracking-widest h-full" id="tab-synthesis">Synthesis</button>
                <button onclick="switchCenterTab('vault')" class="tab-btn text-[10px] uppercase font-black tracking-widest h-full" id="tab-vault">Claims Vault</button>
                <button onclick="switchCenterTab('visualizer')" class="tab-btn text-[10px] uppercase font-black tracking-widest h-full" id="tab-visualizer">Signal Map</button>
                <button onclick="switchCenterTab('gaps')" class="tab-btn text-[10px] uppercase font-black tracking-widest h-full" id="tab-gaps">Voids</button>
            </div>
            <div id="canvas" class="flex-1 p-8 lg:p-14 overflow-y-auto z-10 no-scrollbar">
                <div id="synthesisView" class="animate-in fade-in slide-in-from-bottom-6 duration-700 synthesis-rendered pb-32"></div>
                <div id="vaultView" class="hidden max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6 pb-20" id="claimGrid"></div>
                <div id="visualizerView" class="hidden h-full flex flex-col items-center justify-center animate-in fade-in zoom-in-95">
                    <svg id="snrGraph" viewBox="0 0 500 500" width="450" height="450" class="max-w-full h-auto"></svg>
                    <div class="mt-10 grid grid-cols-2 gap-16 text-center">
                        <div><div class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Confidence</div><div class="text-4xl font-black text-accent" id="statSignal">0%</div></div>
                        <div><div class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Breadth</div><div class="text-4xl font-black text-purple-600" id="statBreadth">0%</div></div>
                    </div>
                </div>
                <div id="gapsView" class="hidden max-w-3xl mx-auto space-y-4" id="gapList"></div>
            </div>
        </section>

        <div id="rightResizer" class="resizer"></div>

        <aside id="rightPane" class="side-pane w-80 flex flex-col bg-[#0d0f12] shrink-0 shadow-2xl" style="width: 320px;">
            <div class="flex-1 p-5 overflow-y-auto no-scrollbar flex flex-col">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Cognitive Log</h3>
                <div id="logStream" class="space-y-2 text-[10px] mono text-slate-500"></div>
            </div>
            <div class="p-5 border-t border-white/5 bg-black/40 space-y-4">
                <div id="pipelineDisplay" class="space-y-1"></div>
                <textarea id="mainInput" placeholder="Refine discovery vector..." class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-xs text-white placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-accent h-24 resize-none transition-all"></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="runPhase('scan')" class="py-2.5 rounded-lg border border-white/10 text-[9px] font-black uppercase hover:border-accent transition-all flex items-center justify-center gap-1.5"><i data-lucide="zap" class="w-3 h-3 text-amber-400"></i> Quick Scan</button>
                    <button onclick="runPhase('forensics')" class="py-2.5 rounded-lg border border-white/10 text-[9px] font-black uppercase hover:border-accent transition-all flex items-center justify-center gap-1.5"><i data-lucide="shield-check" class="w-3 h-3 text-purple-400"></i> Forensics</button>
                </div>
                <button id="runBtn" onclick="initiateResearch()" class="w-full btn-action py-4 rounded-xl text-xs flex items-center justify-center gap-3 font-black uppercase tracking-widest shadow-lg shadow-accent/20 transition-all active:scale-[0.98]">
                    <i data-lucide="play" class="w-4 h-4"></i> Construct Synthesis Brief
                </button>
            </div>
        </aside>
    </main>

    <script>
        const PROVIDER_DEFAULTS = {
            Gemini: { url: 'https://generativelanguage.googleapis.com/v1beta/models/', models: ['gemini-2.0-flash-exp', 'gemini-1.5-pro'] },
            OpenAI: { url: 'https://api.openai.com/v1', models: ['gpt-4o', 'o1-preview'] },
            Claude: { url: 'https://api.anthropic.com/v1/messages', models: ['claude-3-5-sonnet-latest'] },
            Custom: { url: '', models: [] }
        };

        let state = {
            providers: JSON.parse(localStorage.getItem('myres_providers') || '[]'),
            activeProviderId: localStorage.getItem('myres_active_id') || null,
            sources: JSON.parse(localStorage.getItem('myres_trusted_sources') || '[]'),
            topics: JSON.parse(localStorage.getItem('myres_topics') || '[]'),
            activeTopicId: localStorage.getItem('myres_active_topic') || null,
            theme: localStorage.getItem('myres_theme') || 'dark',
            centerTab: 'synthesis',
            settingsTab: 'providers',
            providerBrand: 'Gemini',
            phase: 'idle',
            multiLlm: localStorage.getItem('myres_multi_llm') === 'true',
            showArchived: false,
            leftPaneCollapsed: false,
            rightPaneCollapsed: false,
            editingProviderId: null
        };

        // --- RESIZER ENGINE ---
        function initResizers() {
            const leftPane = document.getElementById('leftPane');
            const rightPane = document.getElementById('rightPane');
            const leftResizer = document.getElementById('leftResizer');
            const rightResizer = document.getElementById('rightResizer');
            let isResizingLeft = false;
            let isResizingRight = false;

            leftResizer.addEventListener('mousedown', () => { isResizingLeft = true; leftPane.classList.add('resizing'); document.body.style.cursor = 'col-resize'; });
            rightResizer.addEventListener('mousedown', () => { isResizingRight = true; rightPane.classList.add('resizing'); document.body.style.cursor = 'col-resize'; });

            document.addEventListener('mousemove', (e) => {
                if (isResizingLeft) {
                    const newWidth = Math.max(150, Math.min(500, e.clientX));
                    leftPane.style.width = newWidth + 'px';
                }
                if (isResizingRight) {
                    const newWidth = Math.max(150, Math.min(600, window.innerWidth - e.clientX));
                    rightPane.style.width = newWidth + 'px';
                }
            });

            document.addEventListener('mouseup', () => {
                if (isResizingLeft || isResizingRight) {
                    isResizingLeft = false; isResizingRight = false;
                    leftPane.classList.remove('resizing'); rightPane.classList.remove('resizing');
                    document.body.style.cursor = 'default';
                }
            });
        }

        // --- UI CORE ---
        function refreshIcons() { lucide.createIcons(); }

        function togglePane(side) {
            if(side === 'left') {
                state.leftPaneCollapsed = !state.leftPaneCollapsed;
                document.getElementById('leftPane').classList.toggle('collapsed', state.leftPaneCollapsed);
                document.getElementById('leftResizer').style.display = state.leftPaneCollapsed ? 'none' : 'block';
            } else {
                state.rightPaneCollapsed = !state.rightPaneCollapsed;
                document.getElementById('rightPane').classList.toggle('collapsed', state.rightPaneCollapsed);
                document.getElementById('rightResizer').style.display = state.rightPaneCollapsed ? 'none' : 'block';
            }
        }

        function setTheme(t) {
            state.theme = t; document.body.setAttribute('data-theme', t); localStorage.setItem('myres_theme', t);
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('bg-white/10', 'text-accent'));
            const activeBtn = document.getElementById(`tbtn-${t}`);
            if(activeBtn) activeBtn.classList.add('bg-white/10', 'text-accent');
            refreshIcons();
        }

        function switchSettingsTab(tab) {
            state.settingsTab = tab;
            document.querySelectorAll('.modal-tab').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById(`stab-${tab}`);
            if(btn) btn.classList.add('active');
            document.querySelectorAll('.settings-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`settings-${tab}`).classList.remove('hidden');
        }

        function toggleModal(id) {
            const m = document.getElementById(id); m.classList.toggle('hidden');
            if (id === 'settingsModal') { renderProviders(); renderSources(); switchProviderBrand(state.providerBrand); }
        }

        function switchCenterTab(tab) {
            state.centerTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            ['synthesisView', 'vaultView', 'visualizerView', 'gapsView'].forEach(v => {
                const el = document.getElementById(v);
                if(el) el.classList.add('hidden');
            });
            document.getElementById(tab + 'View').classList.remove('hidden');
            if (tab === 'visualizer') setTimeout(renderSNRGraph, 50);
        }

        // --- RELIABILITY PIPELINE V5.1 ---
        async function runPhase(phase) {
            const q = document.getElementById('mainInput').value.trim();
            const activeP = state.providers.find(p => p.id == state.activeProviderId);
            if(!activeP) return showToast("Assign agent.");
            const t = state.topics.find(x => x.id == state.activeTopicId) || createNewTopic();
            state.phase = phase === 'scan' ? 'scan' : 'validate'; updateUI();

            try {
                if(phase === 'scan') {
                    addPulseLog('Triage active...');
                    const scan = await callAI_Specific(activeP, q || t.title, "Triage Agent. Identify 5 themes. Semantic check. Brief.");
                    addLog('AI', "Triage Complete: " + scan.substring(0, 150) + "...");
                } else if(phase === 'forensics') {
                    addPulseLog('Generating forensic claims...');
                    const forensic = await callAI_Specific(activeP, `Context: ${t.brief}. Follow-up: ${q}. FORMAT: CLAIM: [VERIFIED/UNCERTAIN] | Text | Reason. SNR: Value%.`, "Structural Parser.");
                    const parsed = parseValidation(forensic);
                    t.claims = [...(t.claims || []), ...parsed.claims].slice(-30);
                    t.snr = parsed.snr;
                    saveState(); loadActiveTopic(); showToast("Forensics Updated.");
                }
            } catch(e) { addLog('ERROR', "Extraction failed."); }
            finally { state.phase = 'idle'; updateUI(); clearPulseLog(); }
        }

        async function initiateResearch() {
            const q = document.getElementById('mainInput').value.trim();
            if(!q) return;
            const activeP = state.providers.find(p => p.id == state.activeProviderId);
            if(!activeP) return showToast("Assign orchestrator.");
            if(!state.activeTopicId) createNewTopic();
            const btn = document.getElementById('runBtn'); btn.disabled = true;
            const t = state.topics.find(x => x.id == state.activeTopicId);

            try {
                state.phase = 'scan'; updateUI();
                addPulseLog('Cognitive Triage Phase 1...');
                const scan = await callAI_Specific(activeP, q, "Triage Agent. Theme Scanning.");
                
                state.phase = 'research'; updateUI();
                const workers = state.providers.filter(p => p.role === 'worker');
                let blocks = [];
                addPulseLog(`Extracting from ${workers.length || 1} agents...`);
                if(state.multiLlm && workers.length > 0) {
                    blocks = await Promise.all(workers.map(p => callAI_Specific(p, `Vector: ${q}\nContext: ${scan}`, "Expert extraction.")));
                } else {
                    blocks = [await callAI_Specific(activeP, `Vector: ${q}\nScan Data: ${scan}`, "Technical synthesis.")];
                }

                addPulseLog('Constructing Synthesis Brief...');
                const synth = await callAI_Specific(activeP, `Synthesize: ${blocks.join("\n\n")}. Markdown format.`, "Senior Lead Architect.");
                t.brief = synth;
                renderSynthesis(t);

                state.phase = 'validate'; updateUI();
                addPulseLog('Phase 4: Forensics Generation...');
                const forensicData = await callAI_Specific(activeP, `Brief: ${synth}. Sources: ${state.sources.join(',')}. FORMAT: CLAIM: [VERIFIED/UNCERTAIN] | Text | Reason. GAP: Topic. SNR: Value%.`, "Structural Parser.");
                const parsed = parseValidation(forensicData);
                t.claims = parsed.claims; t.snr = parsed.snr; t.gaps = parsed.gaps;
                t.breadth = (blocks.length * 20) + 15;
                
                saveState(); loadActiveTopic(); showToast("Synthesis Achieved.");
            } catch(e) { addLog('ERROR', "Pipeline stalled."); }
            finally { state.phase = 'idle'; updateUI(); clearPulseLog(); btn.disabled = false; document.getElementById('mainInput').value = ''; }
        }

        async function callAI_Specific(p, prompt, system) {
            const isGemini = p.type === 'Gemini' || p.url.includes('generativelanguage');
            let cleanUrl = p.url.replace(/\/+$/, '');
            let url = isGemini ? `${cleanUrl}/${p.model}:generateContent?key=${p.key}` : cleanUrl;
            if(!isGemini && !url.endsWith('/chat/completions')) url += '/chat/completions';
            const body = isGemini ? { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: system }] } } : { model: p.model, messages: [{ role: "system", content: system }, { role: "user", content: prompt }] };
            const headers = { 'Content-Type': 'application/json' };
            if(!isGemini) headers['Authorization'] = `Bearer ${p.key}`;
            const res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });
            const data = await res.json();
            if(isGemini) return data.candidates?.[0]?.content?.parts?.[0]?.text || data.candidates?.[0]?.content?.[0]?.parts?.[0]?.text;
            return data.choices?.[0]?.message?.content;
        }

        function parseValidation(raw) {
            // strip potential markdown wrapper
            const clean = raw.replace(/```[a-z]*\n/g, '').replace(/```/g, '').trim();
            const lines = clean.split('\n');
            const claims = [], gaps = []; let snr = 80;
            lines.forEach(l => {
                const line = l.trim();
                if (line.startsWith('CLAIM:')) {
                    const p = line.replace('CLAIM:', '').split('|');
                    claims.push({ status: p[0]?.trim() || '[?]', text: p[1]?.trim() || line, reason: p[2]?.trim() || 'Extracted analysis.' });
                } else if (line.startsWith('GAP:')) gaps.push(line.replace('GAP:', '').trim());
                else if (line.startsWith('SNR:')) snr = parseInt(line.replace('SNR:', '').replace(/\D/g, '')) || 80;
            });
            return { claims, gaps, snr };
        }

        // --- TOPICS ---
        function createNewTopic(parentId = null) {
            const title = prompt("Discovery Name:", "Untitled Vector");
            if (!title) return;
            const nt = { id: Date.now(), title, parentId, brief: null, claims: [], gaps: [], snr: 0, breadth: 0, date: new Date().toISOString(), archived: false };
            state.topics.unshift(nt); state.activeTopicId = nt.id;
            saveState(); renderTopics(); loadActiveTopic();
        }

        function renderTopics() {
            const list = document.getElementById('topicList'); if(!list) return;
            const search = document.getElementById('topicSearch').value.toLowerCase();
            list.innerHTML = '';
            const roots = state.topics.filter(t => !t.parentId);
            roots.forEach(t => renderTopicNode(t, list, 0, search));
            refreshIcons();
        }

        function renderTopicNode(topic, container, depth, search) {
            const matchesSearch = topic.title.toLowerCase().includes(search);
            const matchesArchive = state.showArchived ? topic.archived : !topic.archived;
            if (matchesArchive && (search === '' || matchesSearch)) {
                const node = document.createElement('div');
                node.className = `topic-item group flex items-center justify-between px-3 py-2 rounded-xl cursor-pointer transition-all ${state.activeTopicId == topic.id ? 'active' : 'text-slate-400 hover:bg-white/5'}`;
                node.style.marginLeft = `${depth * 14}px`;
                node.innerHTML = `
                    <div class="flex items-center gap-2 truncate flex-1" onclick="switchTopic(${topic.id})">
                        <i data-lucide="${depth === 0 ? 'folder' : 'chevron-right'}" class="w-3.5 h-3.5 opacity-30"></i>
                        <span class="truncate text-[11px] font-bold">${topic.title}</span>
                    </div>
                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="createNewTopic(${topic.id})" title="Drill Down"><i data-lucide="git-branch" class="w-3 h-3 hover:text-accent"></i></button>
                        <button onclick="archiveTopic(${topic.id})" title="Archive"><i data-lucide="archive" class="w-3 h-3 hover:text-amber-400"></i></button>
                        <button onclick="deleteTopic(${topic.id})" title="Delete"><i data-lucide="trash-2" class="w-3 h-3 hover:text-red-500"></i></button>
                    </div>
                `;
                container.appendChild(node);
            }
            state.topics.filter(t => t.parentId == topic.id).forEach(c => renderTopicNode(c, container, depth + 1, search));
        }

        function switchTopic(id) { state.activeTopicId = id; saveState(); renderTopics(); loadActiveTopic(); }
        function archiveTopic(id) { const t = state.topics.find(x => x.id === id); if(t) t.archived = !t.archived; saveState(); renderTopics(); }
        function deleteTopic(id) { if(confirm("Discard project and branches?")) { state.topics = state.topics.filter(t => t.id !== id && t.parentId !== id); if(state.activeTopicId === id) state.activeTopicId = null; saveState(); renderTopics(); loadActiveTopic(); }}
        function toggleArchiveView() { state.showArchived = !state.showArchived; document.getElementById('archiveToggleBtn').innerText = state.showArchived ? "Active Discovery" : "View Archive"; renderTopics(); }

        // --- RENDERERS ---
        function renderSynthesis(t) { document.getElementById('synthesisView').innerHTML = marked.parse(t.brief || ''); }
        function loadActiveTopic() {
            const t = state.topics.find(x => x.id == state.activeTopicId);
            if (!t) return;
            const synthesis = document.getElementById('synthesisView');
            const vault = document.getElementById('claimGrid');
            const gaps = document.getElementById('gapList');
            if (t.brief) {
                synthesis.innerHTML = marked.parse(t.brief);
                vault.innerHTML = t.claims.map(c => `<div class="claim-card p-6 rounded-3xl bg-white/5"><div class="text-[9px] font-black uppercase mb-3 text-accent">${c.status}</div><p class="text-xs font-bold text-white mb-2 leading-relaxed">${c.text}</p><p class="text-[10px] opacity-40 italic leading-relaxed">${c.reason}</p></div>`).join('');
                gaps.innerHTML = (t.gaps || []).map(g => `<div class="p-4 rounded-xl glass border-white/5 flex items-center justify-between group"><div class="text-sm font-bold text-white">${g}</div><button onclick="drillDown('${g}')" class="btn-outline text-[9px] px-3 py-1 rounded uppercase font-black">Drill Down</button></div>`).join('');
            } else {
                synthesis.innerHTML = `<div class="text-center py-48 opacity-10 uppercase text-xs mono">Initializing Discovery: ${t.title}</div>`;
                vault.innerHTML = gaps.innerHTML = '';
            }
            document.getElementById('statSignal').innerText = (t.snr || 0) + '%';
            document.getElementById('statBreadth').innerText = (t.breadth || 0) + '%';
            updateUI();
        }
        function renderSNRGraph() {
            const svg = document.getElementById('snrGraph');
            const t = state.topics.find(x => x.id == state.activeTopicId);
            if(!t) return;
            const signal = t.snr || 0, breadth = t.breadth || 0, cx = 250, cy = 250;
            const x = cx + ((breadth * 2.2) - 110); const y = cy - ((signal * 2.2) - 110);
            svg.innerHTML = `<circle cx="${cx}" cy="${cy}" r="220" fill="none" stroke="rgba(0,209,255,0.04)" stroke-width="2" /><circle cx="${cx}" cy="${cy}" r="150" fill="none" stroke="rgba(0,209,255,0.04)" /><line x1="40" y1="250" x2="460" y2="250" stroke="rgba(255,255,255,0.05)" /><line x1="250" y1="40" x2="250" y2="460" stroke="rgba(255,255,255,0.05)" /><circle cx="${x}" cy="${y}" r="12" fill="var(--accent)" style="filter: drop-shadow(0 0 10px var(--accent))" />`;
        }

        function drillDown(g) { createNewTopic(state.activeTopicId); document.getElementById('mainInput').value = g; }

        // --- PROVIDERS & UTILS ---
        function switchProviderBrand(b) {
            state.providerBrand = b;
            document.querySelectorAll('.brand-tab').forEach(btn => btn.classList.remove('text-accent', 'border-b', 'border-accent'));
            const brandBtn = document.getElementById('b-'+b);
            if(brandBtn) brandBtn.classList.add('text-accent', 'border-b', 'border-accent');
            const urlInput = document.getElementById('configUrl');
            if(urlInput) urlInput.disabled = (b !== 'Custom');
            if(!state.editingProviderId) {
                if(urlInput) urlInput.value = PROVIDER_DEFAULTS[b].url;
                const models = PROVIDER_DEFAULTS[b].models;
                const modelSel = document.getElementById('configModel');
                if(modelSel) modelSel.innerHTML = models.map(m => `<option value="${m}">${m}</option>`).join('') || '<option disabled selected>Sync required</option>';
            }
        }
        function saveProvider() {
            const name = document.getElementById('configName').value.trim() || state.providerBrand;
            const url = document.getElementById('configUrl').value.trim();
            const key = document.getElementById('configKey').value.trim();
            const model = document.getElementById('configModel').value;
            const role = document.getElementById('configRole').value;
            if(!key || !model) return showToast("Missing data.");
            const p = { id: state.editingProviderId || Date.now(), name, type: state.providerBrand, url, key, model, role };
            if(state.editingProviderId) {
                const idx = state.providers.findIndex(x => x.id === state.editingProviderId);
                state.providers[idx] = p;
            } else {
                state.providers.push(p);
                if(!state.activeProviderId && role === 'orchestrator') state.activeProviderId = p.id;
            }
            saveState(); renderProviders(); resetConfigForm(); showToast("Secured.");
        }
        function renderProviders() {
            const list = document.getElementById('providerList'); if(!list) return;
            list.innerHTML = state.providers.map(p => `<div class="flex items-center gap-4 p-4 rounded-xl border ${state.activeProviderId == p.id ? 'border-accent bg-accent/5' : 'border-white/5 bg-white/5'}"><div class="flex-1 overflow-hidden"><div class="text-[8px] font-black uppercase text-accent opacity-70">${p.role}</div><div class="text-xs font-black text-white truncate">${p.name}</div><div class="text-[9px] mono opacity-40 truncate">${p.model}</div></div><div class="flex gap-1 shrink-0"><button onclick="setActiveProvider(${p.id})" class="px-2.5 py-1.5 text-[9px] border border-white/10 rounded uppercase font-black transition-all ${state.activeProviderId == p.id ? 'bg-accent text-black border-accent' : ''}">${state.activeProviderId == p.id ? 'active' : 'use'}</button><button onclick="editProvider(${p.id})" class="p-1.5"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i></button><button onclick="deleteProvider(${p.id})" class="p-1.5 text-red-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button></div></div>`).join('');
            refreshIcons();
        }
        function editProvider(id) {
            const p = state.providers.find(x => x.id === id);
            state.editingProviderId = id;
            document.getElementById('configName').value = p.name;
            document.getElementById('configKey').value = p.key;
            document.getElementById('configRole').value = p.role;
            switchProviderBrand(p.type);
            document.getElementById('configUrl').value = p.url;
            document.getElementById('configModel').innerHTML = `<option value="${p.model}" selected>${p.model}</option>`;
        }
        function setActiveProvider(id) { state.activeProviderId = id; saveState(); renderProviders(); updateUI(); }
        function deleteProvider(id) { state.providers = state.providers.filter(x => x.id != id); saveState(); renderProviders(); updateUI(); }
        function resetConfigForm() { state.editingProviderId = null; document.getElementById('configName').value = ''; document.getElementById('configKey').value = ''; }
        function addSource() { const v = document.getElementById('newSource').value.trim(); if(v) { state.sources.push(v); document.getElementById('newSource').value = ''; saveState(); renderSources(); }}
        function renderSources() { document.getElementById('sourceList').innerHTML = state.sources.map(s => `<div class="bg-white/5 border border-white/10 rounded-full px-3 py-1 text-[10px] mono flex items-center gap-2">${s} <button onclick="state.sources=state.sources.filter(x=>x!='${s}');saveState();renderSources();"><i data-lucide="x" class="w-3 h-3"></i></button></div>`).join(''); refreshIcons(); }

        function saveState() {
            const multiToggle = document.getElementById('multiLlmToggle');
            if(multiToggle) state.multiLlm = multiToggle.checked;
            localStorage.setItem('myres_providers', JSON.stringify(state.providers));
            localStorage.setItem('myres_active_id', state.activeProviderId);
            localStorage.setItem('myres_trusted_sources', JSON.stringify(state.sources));
            localStorage.setItem('myres_topics', JSON.stringify(state.topics));
            localStorage.setItem('myres_active_topic', state.activeTopicId);
            localStorage.setItem('myres_multi_llm', state.multiLlm);
            localStorage.setItem('myres_theme', state.theme);
        }
        function updateUI() {
            const p = state.providers.find(x => x.id == state.activeProviderId);
            const tag = document.getElementById('activeProviderTag');
            if(tag) tag.innerHTML = p ? `<span class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse mr-2"></span> Lead: ${p.name}` : '<span class="text-red-500 font-bold uppercase">Offline</span>';
            const pipeline = [{ id: 'scan', name: 'Scan', icon: 'zap' }, { id: 'research', name: 'Synthesis', icon: 'cpu' }, { id: 'validate', name: 'Analysis', icon: 'shield-check' }];
            const disp = document.getElementById('pipelineDisplay');
            if(disp) disp.innerHTML = pipeline.map(s => `<div class="flex items-center gap-2 p-2.5 rounded-xl transition-all ${state.phase === s.id ? 'bg-accent/10 text-accent' : 'text-slate-500'}"><i data-lucide="${s.icon}" class="w-3.5 h-3.5"></i><span class="text-[9px] font-black uppercase">${s.name}</span></div>`).join('');
            refreshIcons();
        }
        function addLog(type, msg) {
            const s = document.getElementById('logStream'); if(!s) return;
            const l = document.createElement('div'); l.className = 'flex gap-2 mb-1 animate-in slide-in-from-left-2';
            l.innerHTML = `<span class="uppercase ${type === 'AI' ? 'text-accent' : (type === 'ERROR' ? 'text-red-500' : 'text-slate-500')} font-black">[${type}]</span> <span>${msg}</span>`;
            s.prepend(l);
        }
        function addPulseLog(msg) {
            const s = document.getElementById('logStream'); if(!s) return;
            let p = document.getElementById('pulse-log');
            if(!p) { p = document.createElement('div'); p.id = 'pulse-log'; p.className = 'flex gap-2 mb-2 text-accent italic font-bold'; s.prepend(p); }
            p.innerHTML = `<span>[PROCESS]</span> <span>${msg} <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>`;
        }
        function clearPulseLog() { const p = document.getElementById('pulse-log'); if(p) p.remove(); }
        function showToast(m) { const t = document.getElementById('toast'); document.getElementById('toastMessage').innerText = m; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'), 3000); }

        window.onload = () => {
            const multiToggle = document.getElementById('multiLlmToggle');
            if(multiToggle) multiToggle.checked = state.multiLlm;
            initResizers(); setTheme(state.theme); renderTopics(); loadActiveTopic(); updateUI(); refreshIcons();
            document.getElementById('mainInput').addEventListener('keydown', (e) => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') initiateResearch(); });
        };
    </script>
</body>
