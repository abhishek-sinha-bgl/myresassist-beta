<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyResAssist | Research Lab V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --bg-deep: #0a0b0e;
            --bg-sidebar: #0d0f12;
            --bg-card: rgba(17, 20, 24, 0.9);
            --accent: #00d1ff;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --font-primary: 'Inter', sans-serif;
            --border-val: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg-deep: #f8fafc;
            --bg-sidebar: #f1f5f9;
            --bg-card: rgba(255, 255, 255, 0.95);
            --accent: #2563eb;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --border-val: rgba(0, 0, 0, 0.1);
        }

        [data-theme="academic"] {
            --bg-deep: #fdfbf7;
            --bg-sidebar: #f4f1ea;
            --bg-card: #ffffff;
            --accent: #7c2d12;
            --text-main: #1a1a1a;
            --text-dim: #57534e;
            --font-primary: 'Noto Serif', serif;
            --border-val: rgba(0, 0, 0, 0.15);
        }

        [data-theme="modern"] {
            --bg-deep: #050505;
            --bg-sidebar: #000000;
            --bg-card: rgba(15, 15, 15, 0.8);
            --accent: #c084fc;
            --text-main: #fafafa;
            --text-dim: #a1a1aa;
            --border-val: rgba(255, 255, 255, 0.15);
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-primary);
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--border-val); }
        .input-dark { background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border-val); border-radius: 6px; transition: all 0.2s; color: inherit; }
        
        select option { background-color: #1a1a1a !important; color: #ffffff !important; }
        [data-theme="light"] select option { background-color: #ffffff !important; color: #000000 !important; }

        .btn-outline { border: 1px solid var(--accent); color: var(--accent); transition: all 0.2s; }
        .btn-action { background: var(--accent); color: #000; font-weight: 700; transition: all 0.2s; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 10px; opacity: 0.3; }

        .topic-item.active { background: rgba(0, 209, 255, 0.08); border-left: 3px solid var(--accent); color: var(--accent); }
        .tab-btn.active { border-bottom: 2px solid var(--accent); color: var(--accent); }
        
        .claim-card { transition: all 0.2s ease; }
        .claim-card:hover { transform: translateY(-2px); border-color: var(--accent); }

        @keyframes ping { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
        .ping { position: relative; }
        .ping::after { content: ''; position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: 50%; background: var(--accent); animation: ping 1.5s infinite; opacity: 0.4; }
    </style>
</head>
<body class="h-screen flex flex-col" data-theme="dark">

    <!-- Top Navigation -->
    <nav class="h-14 border-b border-white/5 flex items-center justify-between px-6 glass shrink-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-indigo-600 rounded flex items-center justify-center font-bold text-white shadow-lg">R</div>
            <div>
                <span class="font-bold tracking-tight text-sm">MyResAssist</span>
                <span class="text-[9px] text-accent font-mono ml-1 opacity-70 uppercase tracking-widest block -mt-1">Research Lab V4</span>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="flex items-center bg-black/20 rounded-lg p-1 border border-white/10">
                <button onclick="setTheme('dark')" class="p-1.5 rounded theme-btn" id="tbtn-dark"><i data-lucide="moon" class="w-4 h-4"></i></button>
                <button onclick="setTheme('light')" class="p-1.5 rounded theme-btn" id="tbtn-light"><i data-lucide="sun" class="w-4 h-4"></i></button>
                <button onclick="setTheme('academic')" class="p-1.5 rounded theme-btn" id="tbtn-academic"><i data-lucide="book" class="w-4 h-4"></i></button>
                <button onclick="setTheme('modern')" class="p-1.5 rounded theme-btn" id="tbtn-modern"><i data-lucide="sparkles" class="w-4 h-4"></i></button>
            </div>
            <div id="activeProviderTag" class="text-[10px] mono text-slate-400 hidden lg:flex items-center gap-2 px-3 py-1 bg-white/5 rounded-full border border-white/5"></div>
            <button onclick="toggleModal('settingsModal')" class="text-slate-400 hover:text-accent p-2 transition-colors"><i data-lucide="settings" class="w-5 h-5"></i></button>
        </div>
    </nav>

    <!-- Config Modal -->
    <div id="settingsModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="glass w-full max-w-2xl rounded-xl p-8 modal-enter max-h-[95vh] overflow-y-auto border border-white/10">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-bold" id="modalTitle">API Configuration</h2>
                <button onclick="resetConfigForm(); toggleModal('settingsModal')" class="text-slate-500 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>

            <!-- Orchestration Toggle -->
            <div class="mb-8 p-5 bg-accent/5 rounded-2xl border border-accent/20">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-accent">Orchestration Protocol</h3>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="multiLlmToggle" class="sr-only peer" onchange="saveState()">
                        <div class="w-10 h-5 bg-slate-700 rounded-full peer peer-checked:bg-accent after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>
                        <span class="ml-3 text-[10px] font-bold uppercase tracking-tighter opacity-80">Parallel Mode</span>
                    </label>
                </div>
                <p class="text-[11px] text-slate-400">Parallel mode utilizes all 'Worker' agents for extraction. Orchestrator leads the final brief synthesis.</p>
            </div>

            <!-- Tabs -->
            <div class="flex gap-6 border-b border-white/5 mb-8 text-sm text-slate-500 font-medium">
                <button onclick="switchTab('Claude')" class="provider-tab pb-2" id="tab-Claude">Claude</button>
                <button onclick="switchTab('OpenAI')" class="provider-tab pb-2" id="tab-OpenAI">OpenAI</button>
                <button onclick="switchTab('Gemini')" class="provider-tab pb-2" id="tab-Gemini">Gemini</button>
                <button onclick="switchTab('Custom')" class="provider-tab pb-2" id="tab-Custom">Custom</button>
            </div>

            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Profile Name</label>
                        <input id="configName" type="text" class="w-full input-dark p-2.5 text-xs font-bold" placeholder="e.g. My OpenRouter Profile">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Pipeline Role</label>
                        <select id="configRole" class="w-full input-dark p-2.5 text-xs">
                            <option value="worker">Worker (Research)</option>
                            <option value="orchestrator" selected>Orchestrator (Synthesis)</option>
                        </select>
                    </div>
                </div>

                <div id="endpointContainer">
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">API Base Endpoint</label>
                    <input id="configUrl" type="text" class="w-full input-dark p-2.5 text-xs mono" placeholder="https://api.openai.com/v1">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">API Secret Key</label>
                        <input id="configKey" type="password" class="w-full input-dark p-2.5 text-xs mono" placeholder="sk-...">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Active Model</label>
                        <select id="configModel" class="w-full input-dark p-2.5 text-xs mono">
                             <option value="" disabled selected>Select or fetch models...</option>
                        </select>
                    </div>
                </div>
                
                <button id="fetchModelsBtn" onclick="fetchModels()" class="w-full btn-outline py-2.5 rounded-lg text-xs font-bold flex items-center justify-center gap-2">
                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> <span id="fetchBtnText">Fetch & Verify Models</span>
                </button>
            </div>

            <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-white/5">
                <button onclick="resetConfigForm(); toggleModal('settingsModal')" class="px-6 py-2 rounded text-sm text-slate-400 font-medium">Cancel</button>
                <button onclick="saveProvider()" class="px-8 py-2 rounded text-sm bg-white text-black font-bold shadow-xl">Save & Commit</button>
            </div>

            <div class="mt-10">
                <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Saved Research Profiles</h3>
                <div id="providerList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-12 right-6 z-[110] hidden glass px-5 py-3 rounded-xl border-l-4 border-accent shadow-2xl transition-all translate-y-10">
        <p id="toastMessage" class="text-xs font-bold"></p>
    </div>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-80 border-r border-white/5 flex flex-col bg-[#0d0f12] shrink-0 sidebar-bg">
            <div class="p-5 border-b border-white/5">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Research Tree</h3>
                    <button onclick="createNewTopic()" class="p-1 hover:text-accent"><i data-lucide="plus-circle" class="w-4 h-4"></i></button>
                </div>
                <div id="topicList" class="space-y-1 max-h-60 overflow-y-auto pr-1"></div>
            </div>

            <div class="flex-1 p-5 overflow-y-auto space-y-8">
                <div>
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-3">Pipeline Status</h3>
                    <div id="pipelineDisplay" class="space-y-1"></div>
                </div>
                <div>
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-3">Log Stream</h3>
                    <div id="logStream" class="space-y-2 text-[10px] mono text-slate-500"></div>
                </div>
            </div>

            <div class="p-4 border-t border-white/5 bg-black/40">
                <textarea id="mainInput" placeholder="Initialize research vector..." 
                    class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-xs text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-1 focus:ring-accent resize-none h-24 mb-3"></textarea>
                <button id="runBtn" onclick="initiateResearch()" class="w-full btn-action py-3 rounded-xl text-xs flex items-center justify-center gap-2 shadow-lg shadow-accent/20">
                    <i data-lucide="zap" class="w-4 h-4"></i> Run Pipeline
                </button>
            </div>
        </aside>

        <!-- Right Content Area -->
        <section class="flex-1 flex flex-col relative overflow-hidden bg-[#050505]">
            <div class="absolute top-1/4 left-1/4 w-[600px] h-[600px] bg-accent/5 blur-[140px] rounded-full pointer-events-none"></div>

            <div class="h-12 flex items-center px-8 border-b border-white/5 shrink-0 z-10 glass gap-8">
                <button onclick="switchCenterTab('synthesis')" class="tab-btn active text-[10px] uppercase font-black tracking-widest h-full px-2" id="tab-synthesis">Synthesis</button>
                <button onclick="switchCenterTab('vault')" class="tab-btn text-[10px] uppercase font-black tracking-widest h-full px-2" id="tab-vault">Claims</button>
                <button onclick="switchCenterTab('visualizer')" class="tab-btn text-[10px] uppercase font-black tracking-widest h-full px-2" id="tab-visualizer">Signal</button>
            </div>

            <div id="canvas" class="flex-1 p-8 lg:p-16 overflow-y-auto z-10">
                <div id="synthesisView" class="max-w-4xl mx-auto space-y-12 pb-20"></div>
                <div id="vaultView" class="hidden max-w-5xl mx-auto space-y-8 pb-20"><div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="claimGrid"></div></div>
                <div id="visualizerView" class="hidden h-full flex flex-col items-center justify-center">
                    <svg id="snrGraph" width="500" height="500" class="max-w-full h-auto"></svg>
                </div>
            </div>
        </section>
    </main>

    <script>
        const PROVIDER_DEFAULTS = {
            Gemini: { url: 'https://generativelanguage.googleapis.com/v1beta/models/', models: ['gemini-2.0-flash-exp', 'gemini-1.5-pro'] },
            OpenAI: { url: 'https://api.openai.com/v1', models: ['gpt-4o', 'o1-preview'] },
            Claude: { url: 'https://api.anthropic.com/v1/messages', models: ['claude-3-5-sonnet-latest'] },
            Custom: { url: '', models: [] }
        };

        let state = {
            providers: JSON.parse(localStorage.getItem('myres_providers') || '[]'),
            activeProviderId: localStorage.getItem('myres_active_id') || null,
            topics: JSON.parse(localStorage.getItem('myres_topics') || '[]'),
            activeTopicId: localStorage.getItem('myres_active_topic') || null,
            theme: localStorage.getItem('myres_theme') || 'dark',
            currentTab: 'Gemini',
            centerTab: 'synthesis',
            phase: 'idle',
            multiLlm: localStorage.getItem('myres_multi_llm') === 'true',
            editingProviderId: null
        };

        function refreshIcons() { lucide.createIcons(); }

        function setTheme(t) {
            state.theme = t; document.body.setAttribute('data-theme', t); localStorage.setItem('myres_theme', t);
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('bg-white/10', 'text-accent'));
            const activeBtn = document.getElementById(`tbtn-${t}`);
            if(activeBtn) activeBtn.classList.add('bg-white/10', 'text-accent');
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.classList.toggle('hidden');
            if (id === 'settingsModal') { renderProviders(); switchTab(state.currentTab); }
        }

        function switchCenterTab(tab) {
            state.centerTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            ['synthesisView', 'vaultView', 'visualizerView'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(tab + 'View').classList.remove('hidden');
            if (tab === 'visualizer') renderSNRGraph();
        }

        // --- PROVIDER CRUD ---
        function switchTab(t) {
            state.currentTab = t;
            document.querySelectorAll('.provider-tab').forEach(b => b.classList.remove('tab-active', 'border-accent', 'text-white'));
            document.getElementById('tab-'+t).classList.add('tab-active', 'border-accent', 'text-white');
            
            // Custom endpoint field visibility
            const urlInput = document.getElementById('configUrl');
            urlInput.disabled = (t !== 'Custom');
            
            if (!state.editingProviderId) {
                urlInput.value = PROVIDER_DEFAULTS[t].url;
                const select = document.getElementById('configModel');
                const models = PROVIDER_DEFAULTS[t].models;
                select.innerHTML = models.length ? models.map(m => `<option value="${m}">${m}</option>`).join('') : '<option value="" disabled selected>Manual setup required</option>';
            }
        }

        async function fetchModels() {
            const key = document.getElementById('configKey').value.trim();
            const url = document.getElementById('configUrl').value.trim();
            if (!key) return showToast("API Key required.");
            const btnText = document.getElementById('fetchBtnText');
            btnText.innerText = "Connecting...";

            try {
                let fetchedModels = [];
                if (state.currentTab === 'Gemini') {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error?.message);
                    fetchedModels = data.models.filter(m => m.supportedGenerationMethods.includes("generateContent")).map(m => m.name.split('/').pop());
                } else {
                    const fetchUrl = url.replace(/\/chat\/completions$/, '').replace(/\/$/, '') + '/models';
                    const res = await fetch(fetchUrl, { headers: { 'Authorization': `Bearer ${key}` }});
                    const data = await res.json();
                    if (!res.ok) throw new Error("Endpoint verification failed.");
                    fetchedModels = data.data.map(m => m.id);
                }
                document.getElementById('configModel').innerHTML = fetchedModels.sort().map(m => `<option value="${m}">${m}</option>`).join('');
                showToast(`Retrieved ${fetchedModels.length} models.`);
            } catch (e) {
                showToast("Connection error: Verify Endpoint & Key.");
            } finally { btnText.innerText = "Fetch & Verify Models"; }
        }

        function saveProvider() {
            const name = document.getElementById('configName').value.trim() || state.currentTab;
            const url = document.getElementById('configUrl').value.trim();
            const key = document.getElementById('configKey').value.trim();
            const model = document.getElementById('configModel').value;
            const role = document.getElementById('configRole').value;

            if (!key || !model) return showToast("Key and Model required.");
            if (state.currentTab === 'Custom' && !url) return showToast("Custom URL required.");

            const p = { id: state.editingProviderId || Date.now(), name, type: state.currentTab, url: url.replace(/\/+$/, ''), key, model, role };

            if (state.editingProviderId) {
                const idx = state.providers.findIndex(x => x.id === state.editingProviderId);
                state.providers[idx] = p;
            } else {
                state.providers.push(p);
                if (!state.activeProviderId && role === 'orchestrator') state.activeProviderId = p.id;
            }

            saveState(); renderProviders(); resetConfigForm(); updateUI();
            showToast("Profile persistent.");
        }

        function editProvider(id) {
            const p = state.providers.find(x => x.id === id);
            if (!p) return;
            state.editingProviderId = id;
            document.getElementById('modalTitle').innerText = "Editing: " + p.name;
            document.getElementById('configName').value = p.name;
            document.getElementById('configKey').value = p.key;
            document.getElementById('configRole').value = p.role;
            switchTab(p.type);
            document.getElementById('configUrl').value = p.url;
            const select = document.getElementById('configModel');
            select.innerHTML = `<option value="${p.model}" selected>${p.model}</option>`;
        }

        function renderProviders() {
            const list = document.getElementById('providerList');
            list.innerHTML = state.providers.map(p => `
                <div class="flex items-center gap-4 p-4 rounded border ${state.activeProviderId == p.id ? 'border-accent bg-accent/5' : 'border-white/5 bg-white/5'}">
                    <div class="flex-1 overflow-hidden">
                        <div class="text-[9px] font-black uppercase tracking-widest text-accent opacity-70">${p.role}</div>
                        <div class="text-xs font-bold text-white truncate">${p.name}</div>
                        <div class="text-[10px] mono opacity-40 truncate">${p.model}</div>
                    </div>
                    <div class="flex gap-1 shrink-0">
                        <button onclick="setActiveProvider(${p.id})" class="px-3 py-1.5 text-[9px] border border-white/10 rounded uppercase font-black transition-all ${state.activeProviderId == p.id ? 'bg-accent text-black border-accent' : 'hover:bg-white/5'}">${state.activeProviderId == p.id ? 'active' : 'use'}</button>
                        <button onclick="editProvider(${p.id})" class="p-2 hover:text-accent"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                        <button onclick="deleteProvider(${p.id})" class="p-2 text-red-500 hover:bg-red-500/10"><i data-lucide="trash" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `).join('') || '<div class="text-center py-6 opacity-30 italic text-xs">Awaiting agent configuration.</div>';
            refreshIcons();
        }

        function setActiveProvider(id) { state.activeProviderId = id; saveState(); renderProviders(); updateUI(); }
        function deleteProvider(id) { if(confirm("Discard profile?")) { state.providers = state.providers.filter(x => x.id != id); if(state.activeProviderId == id) state.activeProviderId = null; saveState(); renderProviders(); updateUI(); }}
        function resetConfigForm() { state.editingProviderId = null; document.getElementById('modalTitle').innerText = "Engine Configuration"; document.getElementById('configName').value = ''; document.getElementById('configKey').value = ''; switchTab('Gemini'); }

        // --- PIPELINE CORE ---
        async function initiateResearch() {
            const query = document.getElementById('mainInput').value.trim();
            if (!query) return;
            const activeP = state.providers.find(p => p.id == state.activeProviderId);
            if (!activeP) return showToast("Set active Orchestrator.");
            if (!state.activeTopicId) createNewTopic();

            const btn = document.getElementById('runBtn'); btn.disabled = true;
            const t = state.topics.find(x => x.id == state.activeTopicId);

            try {
                state.phase = 'scan'; updateUI();
                addLog('SYSTEM', 'Multi-Agent Triage active...');
                const scan = await callAI_Specific(activeP, query, "Identify 5 technical themes. Evaluate 'Semantic Potential'. Be technical.");
                
                state.phase = 'research'; updateUI();
                const workers = state.providers.filter(p => p.role === 'worker');
                let researchBlocks = [];
                
                if (state.multiLlm && workers.length > 0) {
                    addLog('SYSTEM', `Orchestrating ${workers.length} Workers...`);
                    researchBlocks = await Promise.all(workers.map(p => callAI_Specific(p, query + "\nContext: " + scan, "Perform deep synthesis.")));
                } else {
                    addLog('SYSTEM', 'Single Core synthesis active...');
                    researchBlocks = [await callAI_Specific(activeP, query + "\nScan Data: " + scan, "Perform Multidimensional Synthesis.")];
                }

                addLog('AI', 'Uniting research blocks...');
                const brief = await callAI_Specific(activeP, "Final synthesis: " + researchBlocks.join("\n\n"), "Chief Scientist. Deliver technical Markdown.");

                state.phase = 'validate'; updateUI();
                addLog('SYSTEM', 'Forensic Claim Validation...');
                const valid = await callAI_Specific(activeP, brief, "Extract claims: CLAIM: [Status] | Text | Reason. SNR: 0-100.");

                const parsed = parseValidation(valid);
                t.brief = brief; t.claims = parsed.claims; t.snr = parsed.snr; t.breadth = (researchBlocks.length * 25);
                
                saveState(); loadActiveTopic();
                showToast("Synthesis Achieved.");
            } catch (err) {
                addLog('ERROR', "Network Failure: Check active profile settings.");
            } finally { state.phase = 'idle'; updateUI(); btn.disabled = false; document.getElementById('mainInput').value = ''; }
        }

        async function callAI_Specific(p, prompt, system) {
            const isGemini = p.type === 'Gemini' || p.url.includes('generativelanguage');
            let cleanUrl = p.url.replace(/\/+$/, '');
            let url = isGemini ? `${cleanUrl}/${p.model}:generateContent?key=${p.key}` : cleanUrl;
            if (!isGemini && !url.endsWith('/chat/completions')) url += '/chat/completions';

            const body = isGemini ? { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: system }] } } 
                                  : { model: p.model, messages: [{ role: "system", content: system }, { role: "user", content: prompt }] };
            const headers = { 'Content-Type': 'application/json' };
            if (!isGemini) headers['Authorization'] = `Bearer ${p.key}`;

            const res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });
            const data = await res.json();
            if (!res.ok) throw new Error("API Refusal");
            return isGemini ? data.candidates?.[0]?.content?.parts?.[0]?.text : data.choices?.[0]?.message?.content;
        }

        function parseValidation(raw) {
            const lines = raw.split('\n');
            const claims = []; let snr = 0;
            lines.forEach(l => {
                if (l.trim().startsWith('CLAIM:')) {
                    const p = l.replace('CLAIM:', '').split('|');
                    claims.push({ status: p[0]?.trim() || '[?]', text: p[1]?.trim() || l, reason: p[2]?.trim() || '' });
                } else if (l.trim().startsWith('SNR:')) snr = parseInt(l.replace('SNR:', '').replace(/\D/g, '')) || 0;
            });
            return { claims, snr };
        }

        // --- TREE ---
        function createNewTopic() {
            const title = prompt("Discovery Title:", "New Vector");
            if (!title) return;
            const nt = { id: Date.now(), title, brief: null, claims: [], snr: 0, breadth: 0, date: new Date().toISOString(), logs: [] };
            state.topics.unshift(nt); state.activeTopicId = nt.id;
            saveState(); renderTopics(); loadActiveTopic();
        }

        function renderTopics() {
            document.getElementById('topicList').innerHTML = state.topics.map(t => `
                <div onclick="switchTopic(${t.id})" class="topic-item group flex items-center justify-between px-3 py-2 rounded-lg cursor-pointer transition-all ${state.activeTopicId == t.id ? 'active font-bold' : 'text-slate-400'}">
                    <span class="truncate">${t.title}</span>
                    <button onclick="event.stopPropagation(); deleteTopic(${t.id})" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-400"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                </div>
            `).join('') || '<p class="text-[10px] text-center opacity-30 py-4">No topics.</p>';
            refreshIcons();
        }

        function switchTopic(id) { state.activeTopicId = id; saveState(); renderTopics(); loadActiveTopic(); }

        function loadActiveTopic() {
            const t = state.topics.find(x => x.id == state.activeTopicId);
            const synthesis = document.getElementById('synthesisView');
            const vault = document.getElementById('claimGrid');
            const logs = document.getElementById('logStream');
            logs.innerHTML = '';
            
            if (t) {
                if (t.brief) {
                    synthesis.innerHTML = `<div class="animate-in fade-in slide-in-from-bottom-4 duration-700"><h1 class="text-5xl font-black mb-12 gradient-text leading-tight tracking-tighter">${t.title}</h1><div class="prose prose-invert max-w-none text-slate-100 whitespace-pre-wrap text-lg">${t.brief}</div></div>`;
                    vault.innerHTML = t.claims.map(c => `<div class="claim-card p-6 rounded-2xl border border-accent/20 bg-accent/5"><div class="text-[10px] font-black uppercase mb-3 text-accent">${c.status}</div><p class="text-sm font-bold text-white mb-2">${c.text}</p><p class="text-xs opacity-60 leading-relaxed">${c.reason}</p></div>`).join('') || '<p class="opacity-30">No claims extracted.</p>';
                } else {
                    synthesis.innerHTML = `<div class="text-center py-40 opacity-20"><i data-lucide="compass" class="w-12 h-12 mx-auto mb-4"></i><p class="mono">Vector ready: ${t.title}</p></div>`;
                    vault.innerHTML = '';
                }
                if(t.logs) t.logs.forEach(l => addLog(l.type, l.msg, false));
                updateUI();
            }
        }

        // --- UTILS ---
        function saveState() {
            state.multiLlm = document.getElementById('multiLlmToggle').checked;
            localStorage.setItem('myres_providers', JSON.stringify(state.providers));
            localStorage.setItem('myres_active_id', state.activeProviderId);
            localStorage.setItem('myres_topics', JSON.stringify(state.topics));
            localStorage.setItem('myres_active_topic', state.activeTopicId);
            localStorage.setItem('myres_multi_llm', state.multiLlm);
            localStorage.setItem('myres_theme', state.theme);
        }
        function updateUI() {
            const p = state.providers.find(x => x.id == state.activeProviderId);
            document.getElementById('activeProviderTag').innerHTML = p ? `<span class="w-1.5 h-1.5 rounded-full bg-accent ping mr-2"></span> Lead: ${p.name}` : '<span class="text-red-500 text-[9px] font-bold">OFFLINE</span>';
            const steps = [{ id: 'scan', name: 'Scan', icon: 'zap' }, { id: 'research', name: 'Synthesis', icon: 'cpu' }, { id: 'validate', name: 'Analysis', icon: 'shield-check' }];
            document.getElementById('pipelineDisplay').innerHTML = steps.map(s => `<div class="flex items-center gap-3 p-2 rounded-lg transition-all ${state.phase === s.id ? 'bg-accent/10 text-accent border border-accent/20' : 'text-slate-500'}"><i data-lucide="${s.icon}" class="w-4 h-4"></i><span class="text-xs font-semibold">${s.name}</span></div>`).join('');
            refreshIcons();
        }
        function addLog(type, msg, save=true) {
            const s = document.getElementById('logStream');
            const l = document.createElement('div');
            l.className = 'flex gap-2 mb-1 animate-in slide-in-from-left-2 duration-300';
            l.innerHTML = `<span class="uppercase ${type === 'AI' ? 'text-accent' : (type === 'ERROR' ? 'text-red-500' : 'text-slate-500')} font-bold">[${type}]</span> <span>${msg}</span>`;
            s.prepend(l);
            if(save && state.activeTopicId) { const t=state.topics.find(x=>x.id==state.activeTopicId); if(t){ if(!t.logs) t.logs=[]; t.logs.push({type, msg}); saveState(); }}
        }
        function showToast(m) { const t = document.getElementById('toast'); document.getElementById('toastMessage').innerText = m; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'), 3000); }
        function renderSNRGraph() { /* Simplified visual */ }

        window.onload = () => {
            document.getElementById('multiLlmToggle').checked = state.multiLlm;
            setTheme(state.theme); renderTopics(); loadActiveTopic(); updateUI(); refreshIcons();
            document.getElementById('mainInput').addEventListener('keydown', (e) => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') initiateResearch(); });
        };
    </script>
</body>
</html>
